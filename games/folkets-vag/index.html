<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folkets Väg</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --border: #0f3460;
  --text: #e0d8c0;
  --text-dim: #8a8472;
  --accent: #c4a35a;
  --accent2: #e94560;
  --input-bg: #0a0e1a;
  --highlight: #f0e6c8;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  line-height: 1.8;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#title-screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #000;
  z-index: 100;
  cursor: pointer;
}
#title-screen img {
  max-width: 80vw; max-height: 60vh;
  image-rendering: pixelated;
  border: 3px solid var(--border);
}
#title-screen h1 {
  font-size: 28px; color: var(--accent);
  margin: 20px 0 8px; text-shadow: 2px 2px 0 #000;
  letter-spacing: 4px;
}
#title-screen .subtitle {
  font-size: 10px; color: var(--text-dim);
  margin-bottom: 20px;
}
#title-menu { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
#title-menu button {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px; padding: 10px 30px;
  background: var(--panel); color: var(--accent);
  border: 2px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
#title-menu button:hover {
  background: var(--border); color: var(--highlight);
  border-color: var(--accent);
}

#game-screen {
  display: none;
  width: 100vw; height: 100vh;
  flex-direction: row;
}

#image-panel {
  flex: 0 0 55%;
  display: flex; flex-direction: column;
  background: #000;
  border-right: 3px solid var(--border);
  position: relative;
}
#game-image-container {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  padding: 8px;
}
#game-image {
  max-width: 100%; max-height: 100%;
  image-rendering: auto;
  border: 2px solid var(--border);
}
#image-label {
  text-align: center;
  padding: 6px;
  font-size: 9px;
  color: var(--text-dim);
  background: var(--panel);
  border-top: 1px solid var(--border);
}

#text-panel {
  flex: 1;
  display: flex; flex-direction: column;
  min-width: 0;
}

#status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px;
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  font-size: 9px;
  flex-shrink: 0;
}
#status-bar .gen-label { color: var(--accent); }
#status-bar .act-label { color: var(--text-dim); }
.status-buttons { display: flex; gap: 6px; }
.status-buttons button {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px; padding: 3px 8px;
  background: var(--input-bg); color: var(--text-dim);
  border: 1px solid var(--border); cursor: pointer;
}
.status-buttons button:hover { color: var(--accent); border-color: var(--accent); }

#text-output {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  scroll-behavior: smooth;
}
#text-output .msg { margin-bottom: 10px; }
#text-output .msg.narrator { color: var(--text); }
#text-output .msg.speaker { color: var(--accent); }
#text-output .msg.system { color: var(--text-dim); font-size: 9px; }
#text-output .msg.error { color: var(--accent2); }
#text-output .msg.cutscene {
  color: var(--highlight);
  border-left: 2px solid var(--accent);
  padding-left: 10px;
}
#text-output .msg.knowledge {
  background: rgba(196,163,90,0.1);
  border: 1px solid var(--accent);
  padding: 8px; margin: 8px 0;
  font-size: 10px;
}
#text-output .msg.knowledge .k-title {
  color: var(--accent); font-size: 11px;
  margin-bottom: 6px;
}
#text-output .dialogue-options {
  margin: 8px 0;
}
#text-output .dialogue-options .opt {
  cursor: pointer; color: var(--accent);
  padding: 3px 0;
}
#text-output .dialogue-options .opt:hover {
  color: var(--highlight);
}

#inventory-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--panel);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 8px; color: var(--text-dim);
  flex-shrink: 0;
  flex-wrap: wrap;
  min-height: 30px;
}
#inventory-bar .inv-label { color: var(--text-dim); margin-right: 4px; }
#inventory-bar .inv-item {
  background: var(--input-bg);
  border: 1px solid var(--border);
  padding: 2px 6px;
  color: var(--text);
  font-size: 8px;
}
#inventory-bar .inv-item.key-item {
  border-color: var(--accent);
  color: var(--accent);
}

#input-area {
  display: flex; align-items: center;
  padding: 8px 12px;
  background: var(--input-bg);
  border-top: 2px solid var(--border);
  flex-shrink: 0;
}
#input-area .prompt-char {
  color: var(--accent); margin-right: 8px; font-size: 12px;
}
#input-area input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  color: var(--highlight);
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  caret-color: var(--accent);
}
#input-area input::placeholder { color: var(--text-dim); font-size: 9px; }

#save-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center; justify-content: center;
}
#save-modal .modal-content {
  background: var(--panel);
  border: 2px solid var(--accent);
  padding: 20px; max-width: 420px; width: 90%;
}
#save-modal h2 {
  color: var(--accent); font-size: 14px;
  margin-bottom: 16px; text-align: center;
}
.save-slot {
  background: var(--input-bg);
  border: 1px solid var(--border);
  padding: 10px; margin: 8px 0;
  cursor: pointer; transition: all 0.15s;
}
.save-slot:hover { border-color: var(--accent); }
.save-slot .slot-title { color: var(--accent); font-size: 10px; }
.save-slot .slot-info { color: var(--text-dim); font-size: 8px; margin-top: 4px; }
.modal-close {
  display: block; margin: 12px auto 0;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px; padding: 6px 16px;
  background: var(--panel); color: var(--text-dim);
  border: 1px solid var(--border); cursor: pointer;
}
.modal-close:hover { color: var(--accent); }

#text-output::-webkit-scrollbar { width: 6px; }
#text-output::-webkit-scrollbar-track { background: var(--input-bg); }
#text-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 900px) {
  #game-screen { flex-direction: column; }
  #image-panel { flex: 0 0 35vh; border-right: none; border-bottom: 3px solid var(--border); }
  #text-panel { flex: 1; }
}
</style>
</head>
<body>

<div id="title-screen">
  <img src="images/titel.png" alt="Folkets Väg">
  <h1>FOLKETS VÄG</h1>
  <div class="subtitle">Ett textäventyr om Sveriges 1800-tal</div>
  <div id="title-menu">
    <button onclick="startNewGame()">NYTT SPEL</button>
    <button onclick="showLoadModal()">LADDA SPEL</button>
  </div>
</div>

<div id="game-screen">
  <div id="image-panel">
    <div id="game-image-container">
      <img id="game-image" src="images/akt1_torpet.png" alt="">
    </div>
    <div id="image-label">AKT 1 - KRIGETS SKUGGA</div>
  </div>
  <div id="text-panel">
    <div id="status-bar">
      <div>
        <span class="gen-label">GEN I: BRITTA</span>
        <span class="act-label"> | AKT <span id="act-num">1</span>/13</span>
      </div>
      <div class="status-buttons">
        <button onclick="showSaveModal('save')">SPARA</button>
        <button onclick="showSaveModal('load')">LADDA</button>
        <button onclick="showKnowledge()">KUNSKAP</button>
      </div>
    </div>
    <div id="text-output"></div>
    <div id="inventory-bar">
      <span class="inv-label">FÖREMÅL:</span>
    </div>
    <div id="input-area">
      <span class="prompt-char">&gt;</span>
      <input type="text" id="player-input" placeholder="Skriv kommando..." autofocus autocomplete="off">
    </div>
  </div>
</div>

<div id="save-modal">
  <div class="modal-content">
    <h2 id="modal-title">SPARA SPEL</h2>
    <div id="save-slots"></div>
    <button class="modal-close" onclick="closeSaveModal()">STÄNG</button>
  </div>
</div>

<script>
// ============================================================
// FOLKETS VÄG - Game Engine
// Generation I: Britta (Acts 1-3)
// ============================================================

// ---- GAME STATE ----
const defaultState = () => ({
  generation: 1,
  act: 1,
  scene: 'start',
  room: null,
  inventory: [],
  flags: {},
  visitedRooms: [],
  hintsUsed: 0,
  hintsThisAct: 0,
  knowledge: [],
  dialogueState: null, // { id, unlockedOptions:[], saidOptions:[] }
  turnCount: 0,
  generationItems: { broschen: true },
  stats: { peopleMet: [], puzzlesSolved: 0 }
});

let state = defaultState();
let inputEnabled = true;
let saveMode = null;

// ---- SYNONYMS ----
const synonyms = {
  'titta': ['se', 'undersök', 'undersok', 'betrakta', 'granska', 'kolla'],
  'ta': ['plocka', 'hämta', 'hamta', 'grip', 'tag'],
  'prata': ['tala', 'snacka', 'fråga', 'fraga', 'säg', 'sag'],
  'gå': ['ga', 'spring', 'vandra', 'rör', 'ror'],
  'öppna': ['oppna', 'lås upp', 'las upp'],
  'använd': ['anvand', 'nyttja', 'bruka'],
  'läs': ['las'],
  'ge': ['giv'],
  'lägg': ['lagg', 'släpp', 'slapp'],
  'stäng': ['stang']
};

const directionMap = {
  'n': 'norr', 'norr': 'norr', 'north': 'norr',
  's': 'söder', 'söder': 'söder', 'soder': 'söder', 'south': 'söder',
  'ö': 'öster', 'öster': 'öster', 'oster': 'öster', 'o': 'öster', 'east': 'öster',
  'v': 'väster', 'väster': 'väster', 'vaster': 'väster', 'west': 'väster',
  'in': 'in', 'ut': 'ut', 'upp': 'upp', 'ner': 'ner'
};

// ---- NORMALIZE for parser ----
function norm(s) {
  return s.toLowerCase().replace(/å/g,'a').replace(/ä/g,'a').replace(/ö/g,'o').trim();
}

function resolveVerb(word) {
  const w = norm(word);
  for (const [verb, syns] of Object.entries(synonyms)) {
    if (norm(verb) === w) return verb;
    for (const s of syns) { if (norm(s) === w) return verb; }
  }
  return word.toLowerCase();
}

// ---- ROOMS ----
// Rule: IN/UT for entering/exiting buildings. NORR/SÖDER/ÖSTER/VÄSTER only outdoors.
const rooms = {
  akt1_torpet_inne: {
    name: "Torpets inre",
    act: 1, image: "akt1_torpet.png",
    imageLabel: "AKT 1 - KRIGETS SKUGGA (1809)",
    description: "Du står i torpets enda rum. Väggarnas stockar har mörknat av rök från spisens ständiga eld. Halmbritsen där ni sover tar upp halva rummet. Spinnrocken står i hörnet. Det är kallt trots elden.\n\nMor sitter vid spisen. Far ligger på britsen och hostar.\n\nDörren leder UT till gården.",
    objects: ['spinnrock', 'halmbrits', 'spis', 'hinken'],
    characters: ['mor_ingrid', 'far_per'],
    exits: { 'ut': 'akt1_garden' },
    firstVisitText: null
  },
  akt1_garden: {
    name: "Gården",
    act: 1, image: "scene_akt1_brunnen.png",
    imageLabel: "GÅRDEN - Brunnen (1809)",
    description: "Gården framför torpet är täckt av smutsig snö. Staketet lutar.\n\nVid husväggen står en nästan tom VEDTRAVE. BRUNNEN ligger mitt på gården, frusen.\n\nVägen leder NORR mot byn och kyrkan.\nGÅ IN för att gå tillbaka till torpet.",
    objects: ['vedtrave', 'brunn'],
    characters: [],
    exits: { 'in': 'akt1_torpet_inne', 'norr': 'akt1_vagen_kyrkan' },
    firstVisitText: "Du kliver ut i kylan. Snön knarrar under dina fötter."
  },
  akt1_vagen_kyrkan: {
    name: "Vägen mot kyrkan",
    act: 1, image: "scene_akt1_brunnen.png",
    imageLabel: "VÄGEN MOT KYRKAN (1809)",
    description: "En smal väg leder genom det snötäckta landskapet mot kyrkbyn.\n\nSÖDER leder tillbaka till torpet.\nNORR leder till kyrkan.",
    objects: [],
    characters: [],
    exits: { 'söder': 'akt1_garden', 'norr': 'akt1_kyrkan' },
    firstVisitText: "Vägen är hård och frusen. Spåren av en häst och vagn syns i snön.",
    condition: () => true
  },
  akt1_kyrkan: {
    name: "Kyrkan",
    act: 1, image: "scene_akt1_kyrkan.png",
    imageLabel: "KYRKAN (1809)",
    description: "Den vita stenkyrkan tornar upp sig mot den grå himlen. Kyrkogården syns bakom kyrkan. Prästgården skymtar bortom kyrkbacken.\n\nVägen leder SÖDER tillbaka mot ert torp.\n\nFolk samlas på kyrkbacken. De viskar om nyheterna.\nKLOCKAREN står vid kyrkporten.",
    objects: ['anslagstavla'],
    characters: ['klockaren'],
    exits: { 'söder': 'akt1_vagen_kyrkan' },
    firstVisitText: "Du har aldrig sett så många människor samlade utanför gudstjänst.",
    condition: () => state.flags.far_is_dead
  },

  // ACT 2 rooms
  akt2_garden_persson: {
    name: "Perssons gård",
    act: 2, image: "akt2_3_garden.png",
    imageLabel: "AKT 2 - PIGAN (1812-1818)",
    description: "Storbondens gård är den största i socknen. Mangårdsbyggnaden har två våningar. Ladugården ligger på andra sidan gårdsplanen.\n\nDu har arbetat här i tre år nu. Som piga lyder du under hustavlans lag.\n\nGÅ IN till köket. Ladugården ligger NORR.\nVägen går SÖDER bort från gården.",
    objects: ['hustavlan'],
    characters: ['husmor_persson', 'drang_anders'],
    exits: { 'in': 'akt2_koket', 'norr': 'akt2_ladugarden', 'söder': 'akt2_vagen' },
    firstVisitText: null
  },
  akt2_koket: {
    name: "Köket",
    act: 2, image: "scene_akt2_koket.png",
    imageLabel: "KÖKET - Perssons gård (1812)",
    description: "Det stora köket i mangårdsbyggnaden. Spisen är enorm - stor nog att stå i. Kopparkastruller hänger på väggen.\n\nDörren leder UT till gården.",
    objects: ['spisen_stor', 'kopparkastruller'],
    characters: [],
    exits: { 'ut': 'akt2_garden_persson' },
    firstVisitText: "Här spenderar du de flesta av dina vakna timmar."
  },
  akt2_ladugarden: {
    name: "Ladugården",
    act: 2, image: "scene_akt2_ladugarden.png",
    imageLabel: "LADUGÅRDEN - Perssons gård (1812)",
    description: "Ladugården luktar hö och kor. Tjugo kor står på rad. Mjölkpallen står vid ingången.\n\nGÅ UT för att gå tillbaka till gården.",
    objects: ['mjolkpall', 'korna'],
    characters: [],
    exits: { 'ut': 'akt2_garden_persson' },
    firstVisitText: "Korna vänder sina stora ögon mot dig."
  },
  akt2_vagen: {
    name: "Vägen från gården",
    act: 2, image: "akt2_3_garden.png",
    imageLabel: "AKT 2 - PIGAN (1812-1818)",
    description: "Vägen leder bort från Perssons gård. Sommarens grönska breder ut sig.\n\nNORR leder tillbaka till gården.",
    objects: [],
    characters: [],
    exits: { 'norr': 'akt2_garden_persson' },
    firstVisitText: "En vacker dag. Men du har inte tid att njuta av den."
  },

  // =============== GENERATION II: LENA ===============

  // ACT 4 rooms
  akt4_bruket_stuga: {
    name: "Stugan vid bruket",
    act: 4, image: "akt3_4_bruket.png",
    imageLabel: "AKT 4 - JORDBRUKETS KRIS (1835)",
    description: "Er stuga vid järnbruket. Liten men varm. Spinnrocken snurrar i hörnet där mor Britta sitter.\n\nFar Anders vilar efter arbetet. Hans händer är svartnade av sot.\n\nGÅ UT till bruksgatan.",
    objects: ['spinnrock_lena', 'psalmbok'],
    characters: ['mor_britta', 'far_anders_old'],
    exits: { 'ut': 'akt4_bruksgatan' },
    firstVisitText: null
  },
  akt4_bruksgatan: {
    name: "Bruksgatan",
    act: 4, image: "akt3_4_bruket.png",
    imageLabel: "BRUKSGATAN (1835)",
    description: "Huvudgatan mellan arbetarstugorna och fabriken. Masugnen glöder NORR. Brukshandeln ligger ÖSTER. Sockenkyrkan är SÖDER.\n\nStugan är GÅ IN.",
    objects: ['anslagstavla_bruket'],
    characters: ['smeden_eriksson'],
    exits: { 'in': 'akt4_bruket_stuga', 'norr': 'akt4_masugnen', 'öster': 'akt4_handeln', 'söder': 'akt4_kyrkan' },
    firstVisitText: "Rök från masugnen hänger tungt över gatan."
  },
  akt4_masugnen: {
    name: "Masugnen",
    act: 4, image: "akt3_4_bruket.png",
    imageLabel: "MASUGNEN (1835)",
    description: "Masugnen tornar upp sig som ett glödande berg. Hettan känns redan på avstånd. Män arbetar vid smältorna med svettiga ansikten.\n\nGÅ SÖDER tillbaka till bruksgatan.",
    objects: [],
    characters: [],
    exits: { 'söder': 'akt4_bruksgatan' },
    firstVisitText: "Hettan slår emot dig som en vägg."
  },
  akt4_handeln: {
    name: "Brukshandeln",
    act: 4, image: "akt3_4_bruket.png",
    imageLabel: "BRUKSHANDELN (1835)",
    description: "Brukshandeln säljer allt från mjöl till tyg. Priserna är höga - allt köps på kredit mot lönen.\n\nGÅ VÄSTER tillbaka till bruksgatan.",
    objects: [],
    characters: [],
    exits: { 'väster': 'akt4_bruksgatan' },
    firstVisitText: "Handlaren noterar varje öre i sin stora bok."
  },
  akt4_kyrkan: {
    name: "Sockenkyrkan",
    act: 4, image: "akt3_4_bruket.png",
    imageLabel: "SOCKENKYRKAN (1835)",
    description: "Den gamla sockenkyrkan står tyst bland lindarna. Kyrkogården sträcker sig bakom.\n\nGÅ NORR tillbaka till bruksgatan.",
    objects: [],
    characters: [],
    exits: { 'norr': 'akt4_bruksgatan' },
    firstVisitText: "Kyrkklockorna ringer till aftonbön."
  },

  // ACT 5 rooms
  akt5_stuga_svalt: {
    name: "Stugan under svälten",
    act: 5, image: "akt5_nodaren.png",
    imageLabel: "AKT 5 - NÖDÅREN (1847)",
    description: "Stugan känns kall. Elden brinner svagt - veden är nästan slut. Skafferiet är nästan tomt.\n\nMor Britta ligger sjuk i sängen. Far Anders sitter vid bordet och stirrar tomt.\n\nGÅ UT till bruksgatan.",
    objects: ['skafferiet'],
    characters: ['mor_britta_sick', 'far_anders_despair'],
    exits: { 'ut': 'akt5_bruksgatan' },
    firstVisitText: null
  },
  akt5_bruksgatan: {
    name: "Bruksgatan",
    act: 5, image: "akt5_nodaren.png",
    imageLabel: "BRUKSGATAN - Nödåren (1847)",
    description: "Gatan är tystare än vanligt. Många stugor står tomma - familjerna har gett sig av.\n\nKyrkan ligger SÖDER. Herrgården NORR. Handeln ÖSTER.\nStugan är GÅ IN.",
    objects: [],
    characters: [],
    exits: { 'in': 'akt5_stuga_svalt', 'söder': 'akt5_kyrkan', 'norr': 'akt5_herrgarden', 'öster': 'akt5_handeln' },
    firstVisitText: "En tunn hund sniffar bland soporna."
  },
  akt5_kyrkan: {
    name: "Kyrkan",
    act: 5, image: "akt5_nodaren.png",
    imageLabel: "KYRKAN (1847)",
    description: "Prästen står vid dörren. Han ser trött ut - många familjer behöver hjälp.\n\nGÅ NORR tillbaka.",
    objects: [],
    characters: ['prasten_act5'],
    exits: { 'norr': 'akt5_bruksgatan' },
    firstVisitText: "Kyrkan har blivit en tillflyktsort för de mest desperata."
  },
  akt5_herrgarden: {
    name: "Herrgården",
    act: 5, image: "akt5_nodaren.png",
    imageLabel: "HERRGÅRDEN (1847)",
    description: "Herrgården är den enda byggnaden som fortfarande ser välmående ut. Rök stiger ur skorstenen. Köket syns genom fönstret.\n\nGÅ SÖDER tillbaka.",
    objects: [],
    characters: ['hushallerska_act5'],
    exits: { 'söder': 'akt5_bruksgatan' },
    firstVisitText: "Lukten av mat från köket gör dig yr av hunger."
  },
  akt5_handeln: {
    name: "Handeln",
    act: 5, image: "akt5_nodaren.png",
    imageLabel: "HANDELN (1847)",
    description: "Handlaren sitter bakom disken. Hyllorna är halvtomma. Priserna är skyhöga.\n\nGÅ VÄSTER tillbaka.",
    objects: [],
    characters: ['handlaren_act5'],
    exits: { 'väster': 'akt5_bruksgatan' },
    firstVisitText: "\"Jag tar bara kontant nu\", säger handlaren innan du ens öppnar munnen."
  },

  // ACT 6 rooms
  akt6_familjen_stuga: {
    name: "Familjens stuga",

// ---- SCENE/EVENT SYSTEM ----
function checkSceneTriggers() {
  // Länsman arrives after getting water
  if (state.flags.har_vatten && state.room === 'akt1_torpet_inne' && !state.flags.lansman_arrived) {
    state.flags.lansman_arrived = true;
    characters.lansman.spawned = true;
    setTimeout(() => {
      setSceneImage('scene_akt1_lansman.png', 'LÄNSMAN ANLÄNDER (1809)');
      printCutscene("Du har just gett far vatten att dricka när det knackar på dörren.\n\nMor öppnar. En man i tjänstekläder står utanför.\nDet är länsman.\n\n\"Fru Persdotter\", säger han stelt. \"Jag har ett meddelande från regementet. Angående er mans tjänst...\"\n\nDu ser hur mor griper om dörrposten.");
      setTimeout(() => {
        startDialogue('lansman_news');
      }, 500);
    }, 300);
    return true;
  }

  // Father dies
  if (state.flags.lansman_gone && !state.flags.far_is_dead) {
    state.flags.far_is_dead = true;
    state.flags.quest_find_new_home = true;
    setTimeout(() => {
      setSceneImage('scene_akt1_fars_dod.png', 'FARS DÖD (1809)');
      printCutscene("[EN VECKA SENARE]\n\nFar somnade in i natt. Stilla. Mor höll hans hand.\n\nDu stod vid väggen och såg på. Det fanns inget att göra. Inget hade kunnat göras.\n\nNu ligger han på britsen. Stilla. Kall.\n\nMor gråter inte. Hon sitter bara där. Stirrar.\n\nPrästen måste underrättas. Och sedan... sedan måste ni hitta någonstans att bo.");
      // Switch dialogue for mor
      characters.mor_ingrid.dialogue = 'mor_ingrid_after';
      // Remove far from room
      const room = rooms.akt1_torpet_inne;
      room.characters = room.characters.filter(c => c !== 'far_per');
      room.description = "Du står i torpets enda rum. Väggarnas stockar har mörknat av rök. Halmbritsen är tom nu. Spinnrocken står i hörnet.\n\nMor sitter vid spisen.\n\nGÅ UT till gården.";
      // Remove lansman
      room.characters = room.characters.filter(c => c !== 'lansman');
    }, 300);
    return true;
  }

  // The choice - transition to Act 2
  if (state.flags.talked_to_mor_after && !state.flags.act1_choice_shown) {
    state.flags.act1_choice_shown = true;
    setTimeout(() => {
      showActChoice();
    }, 500);
    return true;
  }

  // Act 2: Bernadotte news — triggers after romance chain complete, not before
  if (state.act === 2 && state.room === 'akt2_garden_persson' && !state.flags.heard_bernadotte_news && state.flags.romantic_interest_anders) {
    state.flags.heard_bernadotte_news = true;
    setTimeout(() => {
      setSceneImage('scene_akt2_napoleon_nyhet.png', 'NYHETEN OM NAPOLEON (1812)');
      printCutscene("SOMMAREN 1812\n\nHusbonden kommer in med en tidning. Han läser sällan, men idag är hans ögon stora.\n\n\"Napoleon marscherar mot Ryssland!\" ropar han. \"Med en halv miljon soldater!\"\n\nDrängen Anders stannar i arbetet.\n\"Vad gör vår kronprins? Han var ju Napoleons man.\"\n\n\"Bernadotte väntar\", säger husbonden. \"Och planerar.\"");
    }, 800);
    return true;
  }

  // Act 2: Husförhör trigger — after Bernadotte news and a few turns
  if (state.act === 2 && state.flags.heard_bernadotte_news && !state.flags.husforhor_triggered && state.turnCount > (state.flags.act2_start_turn || 0) + 8) {
    state.flags.husforhor_triggered = true;
    setTimeout(() => {
      triggerHusforhor();
    }, 300);
    return true;
  }

  // Act 2 → Act 3 transition: after husförhör
  if (state.act === 2 && state.flags.husforhor_complete && !state.flags.act2_ending_shown) {
    state.flags.act2_ending_shown = true;
    setTimeout(() => { triggerAct2Ending(); }, 500);
    return true;
  }

  // ===== GENERATION II: LENA =====

  // Act 4 → Act 5: after exploring and talking to people (wait 5 turns after both flags)
  if (state.act === 4 && state.flags.heard_famine_rumor && state.flags.heard_skra && !state.flags.act5_triggered
      && state.turnCount > (state.flags.act4_start_turn || 0) + 10) {
    state.flags.act5_triggered = true;
    setTimeout(() => { triggerAct5(); }, 500);
    return true;
  }

  // Act 5: Food quest resolution
  if (state.act === 5 && !state.flags.found_food &&
      (state.flags.food_from_church || state.flags.food_from_manor || state.flags.food_from_selling_brosch)) {
    handleFoodChoice();
    return true;
  }

  // Act 5: Britta dies after finding food (wait 5 turns)
  if (state.act === 5 && state.flags.found_food && !state.flags.britta_is_dead && state.flags.food_found_turn && state.turnCount > state.flags.food_found_turn + 5) {
    setTimeout(() => { triggerBrittaDeath(); }, 500);
    return true;
  }

  // Act 5 → Act 6: after Britta dies and some turns
  if (state.act === 5 && state.flags.britta_is_dead && !state.flags.act6_triggered && state.turnCount > (state.flags.food_found_turn || 0) + 10) {
    state.flags.act6_triggered = true;
    setTimeout(() => { triggerAct6(); }, 500);
    return true;
  }

  return false;
}

let husforhorState = { questionIndex: 0, correct: 0 };
const husforhorQuestions = [
  {
    question: "\"Vad är det första budet?\"",
    options: { a: "Du skall inga andra gudar hava jämte mig.", b: "Du skall icke stjäla.", c: "Hedra din fader och din moder." },
    correct: 'a',
    correctResp: "\"Rätt. Du kan din katekes.\"",
    wrongResp: "\"Fel. Första budet handlar om att Gud är en.\""
  },
  {
    question: "\"Hur många böcker finns i Bibeln?\"",
    options: { a: "Femtio", b: "Sextiosex", c: "Trettiotre" },
    correct: 'b',
    correctResp: "\"Rätt. Sextiosex böcker.\"",
    wrongResp: "\"Fel. Det är sextiosex böcker.\""
  },
  {
    question: "\"Vem döpte Jesus?\"",
    options: { a: "Petrus", b: "Paulus", c: "Johannes Döparen" },
    correct: 'c',
    correctResp: "\"Rätt.\"",
    wrongResp: "\"Fel. Det var Johannes Döparen vid floden Jordan.\""
  }
];

function startHusforhor() {
  husforhorState = { questionIndex: 0, correct: 0 };
  state.flags.in_husforhor = true;
  askHusforhorQuestion();
}

function askHusforhorQuestion() {
  const q = husforhorQuestions[husforhorState.questionIndex];
  printMsg("speaker", "Prästen Lundberg: " + q.question);
  printMsg("narrator", "\n  a) " + q.options.a + "\n  b) " + q.options.b + "\n  c) " + q.options.c);
}

function handleHusforhorAnswer(answer) {
  const a = answer.toLowerCase().trim();
  const q = husforhorQuestions[husforhorState.questionIndex];
  if (!['a','b','c'].includes(a)) {
    printMsg("system", "Svara med a, b eller c.");
    return;
  }
  if (a === q.correct) {
    husforhorState.correct++;
    printMsg("speaker", "Prästen: " + q.correctResp);
  } else {
    printMsg("speaker", "Prästen: " + q.wrongResp);
  }
  husforhorState.questionIndex++;
  if (husforhorState.questionIndex < husforhorQuestions.length) {
    setTimeout(() => askHusforhorQuestion(), 500);
  } else {
    finishHusforhor();
  }
}

function finishHusforhor() {
  state.flags.in_husforhor = false;
  state.flags.husforhor_complete = true;
  state.stats.puzzlesSolved++;
  const c = husforhorState.correct;
  if (c === 3) {
    printCutscene("Prästen skriver i kyrkboken. \"Utmärkt. Britta Persdotter läser väl och kan sin kristendom.\"\n\nDu känner en varm känsla av stolthet.");
  } else if (c === 2) {
    printCutscene("Prästen nickar. \"Godtagbart. Men du bör öva mer.\"\nHan skriver något i kyrkboken.");
  } else {
    printCutscene("Prästen skakar på huvudet. \"Otillräckligt. Du måste komma till prästgården för extra undervisning.\"\n\nSkammen bränner i kinderna. Men livet går vidare.");
  }
  unlockKnowledge('husforhor_kunskap');
}

// ---- UI FUNCTIONS ----
const output = () => document.getElementById('text-output');
const inputEl = () => document.getElementById('player-input');

function printMsg(type, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = text;
  output().appendChild(div);
  output().scrollTop = output().scrollHeight;
}

function printCutscene(text) {
  printMsg("cutscene", text);
}

function setSceneImage(file, label) {
  const img = document.getElementById('game-image');
  const lbl = document.getElementById('image-label');
  img.src = 'images/' + file;
  if (label) lbl.textContent = label;
}

function updateUI() {
  // Act number
  document.getElementById('act-num').textContent = state.act;

  // Generation label
  const genLabels = { 1: 'GEN I: BRITTA', 2: 'GEN II: LENA', 3: 'GEN III: MARIA', 4: 'GEN IV: ELSA' };
  document.querySelector('.gen-label').textContent = genLabels[state.generation] || 'GEN I: BRITTA';

  // Image
  if (state.room && rooms[state.room]) {
    const room = rooms[state.room];
    document.getElementById('game-image').src = 'images/' + room.image;
    document.getElementById('image-label').textContent = room.imageLabel || '';
  }

  // Inventory
  const invBar = document.getElementById('inventory-bar');
  invBar.innerHTML = '<span class="inv-label">FÖREMÅL:</span>';
  if (state.inventory.length === 0) {
    invBar.innerHTML += '<span style="color:var(--text-dim)">Inga</span>';
  } else {
    state.inventory.forEach(id => {
      const item = items[id];
      if (item) {
        const span = document.createElement('span');
        span.className = 'inv-item' + (item.keyItem ? ' key-item' : '');
        span.textContent = item.name;
        invBar.appendChild(span);
      }
    });
  }
}

function describeRoom() {
  const room = rooms[state.room];
  if (!room) return;
  printMsg("narrator", "\n— " + room.name + " —\n");
  const isFirst = !state.visitedRooms.includes(state.room);
  if (isFirst && room.firstVisitText) {
    printMsg("narrator", room.firstVisitText + "\n");
    state.visitedRooms.push(state.room);
  }
  printMsg("narrator", room.description);

  // List visible characters
  const chars = (room.characters || []).filter(cid => {
    const c = characters[cid];
    if (!c) return false;
    if (c.spawned === false) return false;
    return true;
  });
  if (chars.length > 0) {
    const names = chars.map(cid => characters[cid].name);
    printMsg("system", "Här finns: " + names.join(", "));
  }
}

function unlockKnowledge(id) {
  if (!state.knowledge.includes(id) && knowledgePosts[id]) {
    state.knowledge.push(id);
    const k = knowledgePosts[id];
    const div = document.createElement('div');
    div.className = 'msg knowledge';
    div.innerHTML = '<div class="k-title">KUNSKAP UPPLÅST: ' + escHtml(k.title) + '</div>' + escHtml(k.text).replace(/\n/g, '<br>');
    output().appendChild(div);
    output().scrollTop = output().scrollHeight;
  }
}

function showKnowledge() {
  if (state.knowledge.length === 0) {
    printMsg("system", "Du har inga kunskapsposter upplåsta ännu.");
    return;
  }
  printMsg("system", "\n═══ KUNSKAPSJOURNAL ═══\n");
  state.knowledge.forEach(id => {
    const k = knowledgePosts[id];
    if (k) printMsg("knowledge", k.title + "\n" + k.text);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---- DIALOGUE SYSTEM ----
function startDialogue(dialogueId) {
  const d = dialogues[dialogueId];
  if (!d) { printMsg("error", "..."); return; }
  state.dialogueState = {
    id: dialogueId,
    unlockedOptions: [],
    saidOptions: []
  };
  if (!state.stats.peopleMet.includes(d.speaker)) state.stats.peopleMet.push(d.speaker);
  if (d.onStart) d.onStart();
  printMsg("speaker", d.speaker + ": " + d.opening.replace(/\\n/g, '\n'));
  showDialogueOptions(dialogueId);
}

function showDialogueOptions(dialogueId) {
  const d = dialogues[dialogueId];
  if (!d) return;
  const ds = state.dialogueState;
  const available = d.options.filter(opt => {
    // id 0 (close) is always visible
    if (opt.id === 0) return true;
    // If option has a condition function, let it decide visibility entirely
    if (opt.condition) return opt.condition();
    // Options without condition: use unlock system
    if (opt.id !== 1) {
      const isInitial = d.options.indexOf(opt) <= 1;
      const isUnlocked = ds.unlockedOptions.includes(opt.id);
      if (!isInitial && !isUnlocked) return false;
    }
    return true;
  });

  let text = "\n";
  available.forEach(opt => {
    text += opt.id + ". " + opt.text + "\n";
  });
  printMsg("narrator", text);
  state.flags.in_dialogue = true;
  state.flags.current_dialogue = dialogueId;
}

function handleDialogueChoice(choiceStr) {
  const choice = parseInt(choiceStr);
  const dialogueId = state.flags.current_dialogue;
  const d = dialogues[dialogueId];
  if (!d) {
    // Broken dialogue state — force reset
    state.flags.in_dialogue = false;
    state.flags.current_dialogue = null;
    state.dialogueState = null;
    printMsg("system", "Samtalet avslutades.");
    return;
  }

  if (isNaN(choice)) {
    printMsg("system", "Du är i ett samtal. Välj ett nummer (0 = avsluta).");
    return;
  }

  const opt = d.options.find(o => o.id === choice);
  if (!opt) {
    printMsg("system", "Välj ett giltigt alternativ (0 = avsluta).");
    return;
  }
  // Verify the option is actually visible (condition check)
  if (opt.condition && !opt.condition()) {
    printMsg("system", "Välj ett giltigt alternativ (0 = avsluta).");
    return;
  }

  state.dialogueState.saidOptions.push(choice);
  printMsg("speaker", d.speaker + ": " + opt.response);

  if (opt.unlocks) {
    opt.unlocks.forEach(id => {
      if (!state.dialogueState.unlockedOptions.includes(id))
        state.dialogueState.unlockedOptions.push(id);
    });
  }
  if (opt.setsFlag) state.flags[opt.setsFlag] = true;
  if (opt.onSelect) opt.onSelect();
  if (opt.givesItem) {
    state.inventory.push(opt.givesItem);
    printMsg("system", "Du fick: " + (items[opt.givesItem]?.name || opt.givesItem));
  }

  if (choice === 0) {
    state.flags.in_dialogue = false;
    state.flags.current_dialogue = null;
    state.dialogueState = null;
    // Restore room image after dialogue ends
    if (state.room && rooms[state.room]) {
      setSceneImage(rooms[state.room].image, rooms[state.room].imageLabel);
    }
    // Post-dialogue narrative nudges
    if (state.room === 'akt1_kyrkan' && state.flags.knows_about_persson && !state.flags.talked_to_mor_after) {
      setTimeout(() => {
        printMsg("narrator", "\nDu har fått veta vad ni kan göra. Gå tillbaka till torpet och prata med mor.");
      }, 400);
    }
    updateUI();
    setTimeout(() => checkSceneTriggers(), 300);
  } else {
    showDialogueOptions(dialogueId);
  }
}

// ---- PARSER ----
function parseCommand(raw) {
  if (!inputEnabled) return;
  const input = raw.trim();
  if (!input) return;
  state.turnCount++;

  // Check special states
  if (state.flags.america_ending_shown) {
    const lowerInput = input.toLowerCase();
    if (lowerInput.includes('spela') || lowerInput.includes('igen') || lowerInput.includes('nytt')) {
      restartFromAct4();
      return;
    }
    printMsg("system", "Skriv SPELA IGEN för att återvända till Bergslagen.");
    return;
  }
  if (state.flags.awaiting_act1_choice) {
    handleAct1Choice(input);
    return;
  }
  if (state.flags.awaiting_act6_choice) {
    handleAct6Choice(input);
    return;
  }
  if (state.flags.in_husforhor) {
    handleHusforhorAnswer(input);
    return;
  }
  if (state.flags.awaiting_signatures) {
    const lowerInput = input.toLowerCase();
    if (lowerInput.includes('knacka') || lowerInput.includes('dörr') || lowerInput.includes('dorr') || lowerInput.includes('samla')) {
      handleSignatureCollection();
      updateUI();
      setTimeout(() => checkSceneTriggers(), 200);
      return;
    }
    // Fall through to normal parser for other commands
  }
  if (state.flags.in_dialogue) {
    // Allow basic commands even during dialogue
    const lowerInput = input.toLowerCase();
    if (lowerInput === 'hjälp' || lowerInput === 'hjalp' || lowerInput === 'help') {
      handleHelp(); return;
    }
    if (lowerInput === 'inv' || lowerInput === 'inventarier') {
      handleInventory(); return;
    }
    if (lowerInput === 'kunskap' || lowerInput === 'historik') {
      showKnowledge(); return;
    }
    if (lowerInput === 'spara') { showSaveModal('save'); return; }
    if (lowerInput === 'ladda') { showSaveModal('load'); return; }
    handleDialogueChoice(input);
    return;
  }

  const parts = input.toLowerCase().split(/\s+/);
  const verb = resolveVerb(parts[0]);
  const rest = parts.slice(1).join(' ');
  const restNorm = norm(rest);

  switch (verb) {
    case 'titta': handleLook(rest, restNorm); break;
    case 'ta': handleTake(rest, restNorm); break;
    case 'lägg': handleDrop(rest, restNorm); break;
    case 'gå': handleGo(rest, restNorm); break;
    case 'prata': handleTalk(rest, restNorm); break;
    case 'använd': handleUse(rest, restNorm); break;
    case 'öppna': handleOpen(rest, restNorm); break;
    case 'läs': handleRead(rest, restNorm); break;
    case 'ge': handleGive(rest, restNorm); break;
    case 'stäng': printMsg("narrator", "Du stänger det."); break;
    case 'inventarier': case 'inv': handleInventory(); break;
    case 'hjälp': handleHelp(); break;
    case 'spara': showSaveModal('save'); break;
    case 'ladda': showSaveModal('load'); break;
    case 'ledtråd': case 'ledtrad': handleHint(); break;
    case 'historik': showKnowledge(); break;
    case 'kunskap': showKnowledge(); break;
    default:
      // Try as direction
      if (directionMap[norm(parts[0])]) {
        handleGo(parts[0], norm(parts[0]));
      } else {
        printMsg("system", "Jag förstår inte \"" + input + "\". Skriv HJÄLP för kommandon.");
      }
  }

  updateUI();
  setTimeout(() => checkSceneTriggers(), 200);
}

function handleLook(rest, restNorm) {
  if (!rest || rest === '') {
    describeRoom();
    return;
  }
  // Remove 'på' prefix
  let target = rest.replace(/^på\s+/i, '').replace(/^pa\s+/i, '');
  let targetNorm = norm(target);

  const room = rooms[state.room];
  if (!room) return;

  // Check objects in room
  for (const objId of room.objects) {
    const obj = items[objId];
    if (!obj) continue;
    if (obj.hidden && !state.flags[obj.revealedBy + '_examined'] && !state.flags[items[objId]?.revealFlag]) continue;
    if (norm(obj.name) === targetNorm || norm(objId) === targetNorm || targetNorm.includes(norm(obj.name)) || norm(obj.name).includes(targetNorm)) {
      const text = obj.examineText || obj.description;
      printMsg("narrator", text);
      if (obj.revealsItem && !state.flags[obj.revealFlag]) {
        state.flags[obj.revealFlag] = true;
        const revealed = items[obj.revealsItem];
        if (revealed) {
          revealed.hidden = false;
          // Add revealed item to the current room so it can be picked up
          const currentRoom = rooms[state.room];
          if (currentRoom && !currentRoom.objects.includes(obj.revealsItem)) {
            currentRoom.objects.push(obj.revealsItem);
          }
          printMsg("narrator", "Du hittar: " + revealed.name + "!");
        }
      }
      if (obj.readText && !obj.examineText) {
        printMsg("narrator", obj.readText);
      }
      return;
    }
  }

  // Check characters in room
  for (const charId of (room.characters || [])) {
    const ch = characters[charId];
    if (!ch) continue;
    if (ch.spawned === false) continue;
    if (norm(ch.name) === targetNorm || norm(ch.fullName || '') === targetNorm || targetNorm.includes(norm(ch.name)) || norm(ch.name).includes(targetNorm) || norm(ch.fullName || '').includes(targetNorm)) {
      printMsg("narrator", ch.description);
      return;
    }
  }

  // Check inventory
  for (const invId of state.inventory) {
    const obj = items[invId];
    if (obj && (norm(obj.name) === targetNorm || targetNorm.includes(norm(obj.name)))) {
      printMsg("narrator", obj.examineText || obj.description);
      return;
    }
  }

  printMsg("system", "Du ser inget speciellt med \"" + target + "\".");
}

function handleTake(rest, restNorm) {
  if (!rest) { printMsg("system", "Vad vill du ta?"); return; }
  const room = rooms[state.room];
  if (!room) return;

  for (const objId of room.objects) {
    const obj = items[objId];
    if (!obj) continue;
    if (obj.hidden) continue;
    if (norm(obj.name) === restNorm || norm(objId) === restNorm || restNorm.includes(norm(obj.name)) || norm(obj.name).includes(restNorm)) {
      if (!obj.takeable) {
        printMsg("narrator", "Du kan inte ta " + obj.name.toLowerCase() + ".");
        return;
      }
      if (state.inventory.length >= 8) {
        printMsg("system", "Du kan inte bära mer. Lägg något först.");
        return;
      }
      if (state.inventory.includes(objId)) {
        printMsg("system", "Du har redan " + obj.name.toLowerCase() + ".");
        return;
      }
      state.inventory.push(objId);
      room.objects = room.objects.filter(o => o !== objId);
      printMsg("narrator", "Du tar " + obj.name.toLowerCase() + ".");
      return;
    }
  }
  printMsg("system", "Du ser ingen \"" + rest + "\" att ta.");
}

function handleDrop(rest, restNorm) {
  if (!rest) { printMsg("system", "Vad vill du lägga?"); return; }
  for (const invId of state.inventory) {
    const obj = items[invId];
    if (obj && (norm(obj.name) === restNorm || restNorm.includes(norm(obj.name)))) {
      if (obj.keyItem) {
        printMsg("narrator", "Du kan inte göra dig av med " + obj.name.toLowerCase() + ". Den är för viktig.");
        return;
      }
      state.inventory = state.inventory.filter(i => i !== invId);
      const room = rooms[state.room];
      if (room) room.objects.push(invId);
      printMsg("narrator", "Du lägger ned " + obj.name.toLowerCase() + ".");
      return;
    }
  }
  printMsg("system", "Du har ingen \"" + rest + "\".");
}

function handleGo(rest, restNorm) {
  if (!rest) { printMsg("system", "Åt vilket håll? (NORR, SÖDER, ÖSTER, VÄSTER, IN, UT)"); return; }
  const room = rooms[state.room];
  if (!room) return;

  // Resolve direction
  let dir = directionMap[restNorm] || directionMap[norm(rest.replace(/^till\s+/i, ''))] || rest.toLowerCase();

  // Check exit
  const destId = room.exits[dir];
  if (!destId) {
    printMsg("narrator", "Du kan inte gå åt det hållet.");
    return;
  }
  const dest = rooms[destId];
  if (!dest) {
    printMsg("narrator", "Du kan inte gå dit just nu.");
    return;
  }
  if (dest.condition && !dest.condition()) {
    printMsg("narrator", "Du kan inte gå dit just nu.");
    return;
  }

  state.room = destId;
  if (!state.visitedRooms.includes(destId)) state.visitedRooms.push(destId);
  updateUI();
  describeRoom();
}

function handleTalk(rest, restNorm) {
  if (!rest) { printMsg("system", "Med vem vill du prata?"); return; }
  let target = rest.replace(/^med\s+/i, '');
  let targetNorm = norm(target);
  const room = rooms[state.room];
  if (!room) return;

  for (const charId of (room.characters || [])) {
    const ch = characters[charId];
    if (!ch) continue;
    if (ch.spawned === false) continue;
    if (norm(ch.name) === targetNorm || norm(ch.fullName || '') === targetNorm || targetNorm.includes(norm(ch.name)) || norm(ch.name).includes(targetNorm) || norm(ch.fullName || '').includes(targetNorm)) {
      if (ch.dialogue && dialogues[ch.dialogue]) {
        startDialogue(ch.dialogue);
      } else {
        printMsg("narrator", ch.name + " har inget att säga just nu.");
      }
      return;
    }
  }
  printMsg("system", "Du ser ingen \"" + target + "\" att prata med.");
}

function handleUse(rest, restNorm) {
  if (!rest) { printMsg("system", "Vad vill du använda?"); return; }

  // Check "ANVÄND X PÅ Y"
  const onMatch = rest.match(/(.+?)\s+(?:på|pa)\s+(.+)/i);
  if (onMatch) {
    const itemName = norm(onMatch[1]);
    const targetName = norm(onMatch[2]);
    return handleUseOn(itemName, targetName);
  }

  // Simple use
  printMsg("narrator", "Hur vill du använda det? Prova ANVÄND [föremål] PÅ [mål].");
}

function handleUseOn(itemNorm, targetNorm) {
  // Water puzzle: use bucket on well
  if ((itemNorm.includes('hink') && targetNorm.includes('brunn'))) {
    if (!state.inventory.includes('hinken')) {
      printMsg("narrator", "Du har ingen hink.");
      return;
    }
    if (!state.flags.found_axe) {
      printMsg("narrator", "Brunnen är frusen. Du kan inte få upp vatten. Du behöver något att bryta isen med.");
      return;
    }
    // Player has axe but hasn't used it yet - hint to use axe instead
    if (state.inventory.includes('yxa')) {
      printMsg("narrator", "Brunnen är frusen. Du har en yxa - prova att ANVÄND YXA PÅ BRUNN.");
      return;
    }
    // If axe was already used (har_vatten should be set), this shouldn't happen
    printMsg("narrator", "Brunnen är frusen.");
    return;
  }

  // Axe on well
  if (itemNorm.includes('yx') && targetNorm.includes('brunn')) {
    if (!state.inventory.includes('yxa')) {
      printMsg("narrator", "Du har ingen yxa.");
      return;
    }
    state.inventory = state.inventory.filter(i => i !== 'yxa');
    state.inventory = state.inventory.filter(i => i !== 'hinken');
    state.inventory.push('hink_med_vatten');
    state.flags.har_vatten = true;
    state.stats.puzzlesSolved++;
    printMsg("narrator", "Du hugger bort isen från brunnen. Det tar tid, men till slut kan du sänka ner hinken.\n\nKallt vatten stiger upp.\n\nDu fyller hinken med vatten.");
    return;
  }

  // Give water to far
  if ((itemNorm.includes('vatten') || itemNorm.includes('hink')) && (targetNorm.includes('far') || targetNorm.includes('per'))) {
    if (state.inventory.includes('hink_med_vatten')) {
      printMsg("narrator", "Du ger far vatten att dricka. Han dricker girigt.");
      state.flags.gave_water_to_far = true;
      return;
    }
  }

  // Leaflet distribution
  if ((itemNorm.includes('flygblad') || itemNorm.includes('blad')) && state.flags.has_leaflets) {
    if (handleLeafletDistribution(targetNorm)) return;
  }

  printMsg("narrator", "Det fungerar inte.");
}

function handleRead(rest, restNorm) {
  if (!rest) { printMsg("system", "Vad vill du läsa?"); return; }
  const room = rooms[state.room];

  // Check room objects
  if (room) {
    for (const objId of room.objects) {
      const obj = items[objId];
      if (!obj) continue;
      if (norm(obj.name) === restNorm || restNorm.includes(norm(obj.name)) || norm(obj.name).includes(restNorm)) {
        if (obj.readText) {
          printMsg("narrator", obj.readText);
          if (obj.onRead) obj.onRead();
          return;
        } else {
          printMsg("narrator", "Det finns inget att läsa på " + obj.name.toLowerCase() + ".");
          return;
        }
      }
    }
  }

  // Check inventory
  for (const invId of state.inventory) {
    const obj = items[invId];
    if (obj && (norm(obj.name) === restNorm || restNorm.includes(norm(obj.name)))) {
      if (obj.readText) {
        printMsg("narrator", obj.readText);
        if (obj.onRead) obj.onRead();
      } else {
        printMsg("narrator", "Det finns inget att läsa.");
      }
      return;
    }
  }
  printMsg("system", "Du hittar inget att läsa.");
}

function handleGive(rest, restNorm) {
  if (!rest) { printMsg("system", "Ge vad till vem? GE [föremål] TILL [person]"); return; }
  const match = rest.match(/(.+?)\s+till\s+(.+)/i);
  if (match) {
    handleUseOn(norm(match[1]), norm(match[2]));
  } else {
    printMsg("system", "Ge vad till vem? GE [föremål] TILL [person]");
  }
}

function handleOpen(rest, restNorm) {
  printMsg("narrator", "Det går inte att öppna.");
}

function handleInventory() {
  if (state.inventory.length === 0) {
    printMsg("system", "Du bär inga föremål.");
    return;
  }
  printMsg("system", "Du bär:");
  state.inventory.forEach(id => {
    const obj = items[id];
    if (obj) printMsg("system", "  - " + obj.name + (obj.keyItem ? " [NYCKELFÖREMÅL]" : ""));
  });
}

function handleHelp() {
  printMsg("system", "═══ KOMMANDON ═══\n\nTITTA / TITTA PÅ [X]  - Undersök\nTA [X]                - Plocka upp\nLÄGG [X]              - Lägg ned\nLÄS [X]               - Läs text\nANVÄND [X] PÅ [Y]    - Använd föremål\nGE [X] TILL [Y]       - Ge föremål\nPRATA MED [X]         - Prata med person\nGÅ [NORR/SÖDER/ÖSTER/VÄSTER/IN/UT]\nINV                   - Visa föremål\nLEDTRÅD               - Få hjälp\nKUNSKAP               - Visa kunskapsjournal\nSPARA / LADDA         - Spara/ladda spel\nHJÄLP                 - Visa detta");
}

let lastHintContext = '';
let hintIndexInContext = 0;

function handleHint() {
  const contextHints = getContextualHints();
  if (!contextHints || contextHints.length === 0) {
    printMsg("system", "Inga ledtrådar tillgängliga just nu.");
    return;
  }
  // Build a key from the hints to detect context change
  const contextKey = contextHints[0];
  if (contextKey !== lastHintContext) {
    lastHintContext = contextKey;
    hintIndexInContext = 0;
  }
  printMsg("system", "LEDTRÅD: " + contextHints[hintIndexInContext]);
  if (hintIndexInContext < contextHints.length - 1) hintIndexInContext++;
  state.hintsUsed++;
}

// ---- SAVE/LOAD ----
function showSaveModal(mode) {
  saveMode = mode;
  document.getElementById('save-modal').style.display = 'flex';
  document.getElementById('modal-title').textContent = mode === 'save' ? 'SPARA SPEL' : 'LADDA SPEL';
  const slotsDiv = document.getElementById('save-slots');
  slotsDiv.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const key = 'folkets_vag_save_' + i;
    let info = 'Tom';
    try {
      const saved = localStorage.getItem(key);
      if (saved) {
        const data = JSON.parse(saved);
        const genNames = { 1: 'Britta', 2: 'Lena', 3: 'Maria', 4: 'Elsa' };
        info = `Gen ${data.generation}: ${genNames[data.generation] || '?'}, Akt ${data.act}, ${data.date || ''}`;
      }
    } catch(e) {}
    const slot = document.createElement('div');
    slot.className = 'save-slot';
    slot.innerHTML = `<div class="slot-title">Plats ${i}</div><div class="slot-info">${escHtml(info)}</div>`;
    slot.onclick = () => { handleSlotClick(i); };
    slotsDiv.appendChild(slot);
  }
}

function closeSaveModal() {
  document.getElementById('save-modal').style.display = 'none';
  saveMode = null;
}

function showLoadModal() {
  showSaveModal('load');
}

function handleSlotClick(slotNum) {
  const key = 'folkets_vag_save_' + slotNum;
  if (saveMode === 'save') {
    const saveData = JSON.parse(JSON.stringify(state));
    saveData.date = new Date().toLocaleString('sv-SE');
    // Remove non-serializable stuff
    delete saveData.dialogueState;
    try {
      localStorage.setItem(key, JSON.stringify(saveData));
      printMsg("system", "Spel sparat i plats " + slotNum + ".");
    } catch(e) {
      printMsg("error", "Kunde inte spara.");
    }
  } else {
    try {
      const saved = localStorage.getItem(key);
      if (!saved) {
        printMsg("system", "Ingen sparning i plats " + slotNum + ".");
        closeSaveModal();
        return;
      }
      const data = JSON.parse(saved);
      // Restore state
      Object.assign(state, data);
      state.dialogueState = null;
      state.flags.in_dialogue = false;
      state.flags.current_dialogue = null;
      state.flags.in_husforhor = false;
      state.flags.awaiting_act1_choice = false;
      state.flags.awaiting_act6_choice = false;
      state.flags.america_ending_shown = false;
      // Reset signature state if loading during Act 12
      if (state.flags.awaiting_signatures && !state.flags.signatures_collected) {
        signatureState = { doorsKnocked: 0, signatures: state.flags.signatures_count || 0 };
      }
      updateUI();
      describeRoom();
      printMsg("system", "Spel laddat från plats " + slotNum + ".");
      // Hide title screen
      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
    } catch(e) {
      printMsg("error", "Kunde inte ladda.");
    }
  }
  closeSaveModal();
}

// ---- GAME START ----
function startNewGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  state = defaultState();
  state.room = 'akt1_torpet_inne';
  state.flags.game_started = true;
  state.flags.far_is_sick = true;

  // Reset room objects to defaults (prevents duplicates on replay)
  rooms.akt1_torpet_inne.objects = ['spinnrock', 'halmbrits', 'spis', 'hinken', 'broschen'];
  rooms.akt1_torpet_inne.characters = ['mor_ingrid', 'far_per'];
  rooms.akt1_torpet_inne.description = "Du står i torpets enda rum. Väggarnas stockar har mörknat av rök från spisens ständiga eld. Halmbritsen där ni sover tar upp halva rummet. Spinnrocken står i hörnet. Det är kallt trots elden.\n\nMor sitter vid spisen. Far ligger på britsen och hostar.\n\nDörren leder UT till gården.";
  rooms.akt1_garden.objects = ['vedtrave', 'brunn'];
  // Reset item states
  items.yxa.hidden = true;
  items.soldatknappen.hidden = true;
  // Reset character states
  characters.lansman.spawned = false;
  characters.mor_ingrid.dialogue = 'mor_ingrid_start';
  characters.drang_anders.dialogue = 'anders_default';

  updateUI();

  // Opening cutscene
  printCutscene("MARS 1809.\n\nDu vaknar av kylan. Britsen är hård under dig, halmen sticker. Dina syskon sover tätt intill dig - deras värme är det enda som håller frosten borta.\n\nFar hostar i sin vrå. Det låter våtare idag. Värre.\n\nMor är redan uppe vid spisen, men elden är svag. Det finns ingen ved kvar.");

  setTimeout(() => {
    printMsg("system", "Du är BRITTA PERSDOTTER, 15 år. Skriv HJÄLP för kommandon.\n");
    describeRoom();
    inputEl().focus();
  }, 500);
}

// ---- INPUT HANDLING ----
document.getElementById('player-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (!val) return;
    printMsg("system", "> " + val);
    this.value = '';
    parseCommand(val);
  }
});

// Ensure input focus
document.addEventListener('click', () => {
  if (document.getElementById('game-screen').style.display === 'flex') {
    inputEl().focus();
  }
});
