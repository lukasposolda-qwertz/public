<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The River of Forgetting — POC</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Libre Baskerville', serif; }

    /* ── FULL-SCREEN SCENE IMAGE ── */
    #scene {
      position: fixed;
      inset: 0;
      background: url('assets/scene1_bedroom.png') center / cover no-repeat;
    }

    /* ── HOTSPOT LAYER — stops at overlay top so hotspots never enter the panels ── */
    #hs-layer {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 200px; /* same height as overlay */
    }

    .hs {
      position: absolute;
      cursor: pointer;
    }
    .hs-ring {
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color .18s, background .18s;
    }
    .hs:hover .hs-ring {
      border-color: rgba(255, 220, 120, .4);
      background: rgba(255, 220, 120, .04);
    }
    .hs-lbl {
      position: absolute;
      bottom: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: rgba(0, 0, 0, .72);
      color: #e0cfa0;
      font-size: .68rem;
      letter-spacing: .08em;
      padding: 3px 9px;
      border-radius: 2px;
      opacity: 0;
      transition: opacity .15s;
      pointer-events: none;
    }
    .hs:hover .hs-lbl { opacity: 1; }

    /* ── GRADIENT BLEED — image fades into overlay ── */
    #scene::after {
      content: '';
      position: absolute;
      bottom: 200px;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(to bottom, transparent, rgba(6, 5, 3, .78));
      pointer-events: none;
    }

    /* ── OVERLAY BOTTOM — sits on top of image ── */
    #overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      display: flex;
      z-index: 10;
    }

    /* ── TEXT PANEL (72%) ── */
    #text-panel {
      flex: 0 0 72%;
      background: rgba(6, 5, 3, .86);
      border-top: 1px solid rgba(200, 168, 74, .22);
      border-right: 1px solid rgba(200, 168, 74, .1);
      padding: 18px 24px 14px;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      user-select: none;
    }
    #text-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #text-line {
      font-style: italic;
      font-size: .97rem;
      line-height: 1.75;
      color: #c4b484;
    }
    #text-line .spk {
      display: block;
      font-style: normal;
      font-weight: 700;
      font-size: .86rem;
      letter-spacing: .05em;
      color: #c8a84a;
      margin-bottom: .25rem;
    }
    #click-hint {
      flex-shrink: 0;
      font-size: .68rem;
      letter-spacing: .1em;
      color: rgba(200, 168, 74, .28);
      text-align: right;
      margin-top: 8px;
    }

    /* ── INVENTORY PANEL (28%) ── */
    #inv-panel {
      flex: 0 0 28%;
      background: rgba(6, 5, 3, .82);
      border-top: 1px solid rgba(200, 168, 74, .22);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
    }
    #inv-hdr {
      font-size: .66rem;
      letter-spacing: .16em;
      color: rgba(200, 168, 74, .38);
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    #inv-items {
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow-y: auto;
      flex: 1;
    }
    .inv-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border: 1px solid rgba(200, 168, 74, .14);
      border-radius: 3px;
      cursor: pointer;
      transition: background .18s, border-color .18s;
    }
    .inv-item:hover { background: rgba(200, 168, 74, .07); }
    .inv-item.selected { background: rgba(200, 168, 74, .14); border-color: rgba(200, 168, 74, .45); }
    .inv-item img { width: 34px; height: 34px; object-fit: contain; flex-shrink: 0; }
    .inv-name { font-size: .78rem; color: #b0a070; line-height: 1.3; }
    .inv-empty { font-style: italic; font-size: .78rem; color: rgba(200, 168, 74, .22); }
  </style>
</head>
<body>
<div id="scene">

  <!-- Hotspot layer — bounded above the overlay -->
  <div id="hs-layer"></div>

  <!-- Bottom overlay -->
  <div id="overlay">

    <div id="text-panel">
      <div id="text-body">
        <div id="text-line">Something pulled me out of sleep before the sun. Not a sound, not a dream — just a feeling. Like I'd lost something in the night and my body knew before my mind did.</div>
      </div>
      <div id="click-hint">click to continue</div>
    </div>

    <div id="inv-panel">
      <div id="inv-hdr">◈ Inventory</div>
      <div id="inv-items">
        <span class="inv-empty">Empty</span>
      </div>
    </div>

  </div><!-- /overlay -->

</div><!-- /scene -->

<script>
// ── POC: Scene 1 — layout & interaction test ─────────────────────────────────

const textEl   = document.getElementById('text-line');
const hintEl   = document.getElementById('click-hint');
const invItems = document.getElementById('inv-items');
const tPanel   = document.getElementById('text-panel');

// ── Text queue ────────────────────────────────────────────────────────────────
const openingLines = [
  { n: "Something pulled me out of sleep before the sun. Not a sound, not a dream — just a feeling. Like I'd lost something in the night and my body knew before my mind did." },
  { n: "My name is Yiannis. I'm twelve. I live on a small island in the Cyclades. My mother died two years ago. I know this. I remember the funeral, the neighbours, my father sitting very still." },
  { n: "But this morning that knowledge feels lighter. Like it's losing weight. I should look around." },
];
let qIdx = 0;
let busy = false;

function showNarration(text) {
  textEl.innerHTML = text;
  textEl.style.fontStyle = 'italic';
}
function showDialogue(speaker, text) {
  textEl.innerHTML = `<span class="spk">${speaker}</span>${text}`;
  textEl.style.fontStyle = 'normal';
}

function showLine(line) {
  if (line.n !== undefined) showNarration(line.n);
  else if (line.d !== undefined) showDialogue(line.s, line.d);
  hintEl.textContent = 'click to continue';
  busy = true;
}

// Start with opening
showLine(openingLines[0]);

tPanel.addEventListener('click', () => {
  if (!busy) return;
  qIdx++;
  if (qIdx < openingLines.length) {
    showLine(openingLines[qIdx]);
  } else {
    hintEl.textContent = '';
    busy = false;
  }
});

// ── Inventory ─────────────────────────────────────────────────────────────────
const ITEMS = {
  book:     { name: 'Book of Myths',   icon: 'assets/icon_book.png' },
  laurel:   { name: 'Laurel Branch',   icon: 'assets/icon_laurel.png' },
  asphodel: { name: 'Asphodel Flower', icon: 'assets/icon_asphodel.png' },
};
const inventory = [];
let selected = null;

function addItem(id) {
  if (!inventory.includes(id)) { inventory.push(id); renderInv(); }
}
function renderInv() {
  invItems.innerHTML = '';
  if (!inventory.length) {
    invItems.innerHTML = '<span class="inv-empty">Empty</span>';
    return;
  }
  inventory.forEach(id => {
    const it = ITEMS[id];
    const d = document.createElement('div');
    d.className = 'inv-item' + (selected === id ? ' selected' : '');
    d.innerHTML = `<img src="${it.icon}" alt="${it.name}"><span class="inv-name">${it.name}</span>`;
    d.onclick = () => {
      selected = selected === id ? null : id;
      renderInv();
      if (selected) showNarration(`Use ${it.name} on…`);
    };
    invItems.appendChild(d);
  });
}

// ── Hotspots ──────────────────────────────────────────────────────────────────
// Coordinates are % of the hs-layer (which is full width, viewport-height minus 200px).
// Hotspot y values are recalculated: original % of full image → % of the 72% visible strip.
// Full viewport = 720px (assumed). hs-layer height = 520px = 72.2% of viewport.
// Conversion: new_y = (orig_y * 720) / 520  … but simpler to just eyeball per scene.
// For this POC the positions are tuned by eye to match the bedroom image content.

const hotspots = [
  { id:'window', label:'Window',      x: 0,  y: 3,  w: 22, h: 88 },
  { id:'book',   label:'Old book',    x: 26, y: 25, w: 16, h: 72 },
  { id:'bed',    label:'My bed',      x: 45, y: 12, w: 30, h: 76 },
  { id:'photo',  label:'Photo of Mum',x: 46, y: 72, w: 18, h: 26 },
  { id:'flower', label:'Dried herb',  x: 76, y: 2,  w: 16, h: 42 },
  { id:'door',   label:'Front door',  x: 93, y: 18, w: 7,  h: 78 },
];

const hsText = {
  window: { n: "Blue sea, flat as glass. The sun's coming up behind the hills and turning everything gold. My father's out there — he leaves before dawn now." },
  book:   { n: "A worn paperback. \"Myths of the Greeks\" — my mother's copy. Cracked spine, pencil marks in the margins. She used to read to me from this every night.", action: 'book' },
  bed:    { n: "Same blue sheets. My mother used to sit right here on the edge every night. She'd sit down and the mattress would dip, and I'd roll slightly toward her. And then she'd — the next part is gone." },
  photo:  { n: "A framed photo on the nightstand. My mother — Maria. Dark hair, wide smile. I can describe every detail. But I can't feel it. It's like looking at a stranger." },
  flower: { n: "A dried herb in a clay vase. My mother put it here and said something. I can see her mouth moving, her face turned toward me. But the sound is off. Like a video on mute." },
  door:   { n: "I should look around first. Something is wrong and I need to understand what before I go anywhere." },
};

const visited = new Set();
const layer = document.getElementById('hs-layer');

hotspots.forEach(hs => {
  const el = document.createElement('div');
  el.className = 'hs';
  el.id = 'hs-' + hs.id;
  el.style.cssText = `left:${hs.x}%;top:${hs.y}%;width:${hs.w}%;height:${hs.h}%`;
  el.innerHTML = `<div class="hs-ring"></div><div class="hs-lbl">${hs.label}</div>`;
  el.addEventListener('click', () => {
    const t = hsText[hs.id];
    if (!t) return;
    if (t.n) showNarration(t.n);
    if (t.d) showDialogue(t.s, t.d);
    hintEl.textContent = '';
    busy = false;
    if (t.action === 'book' && !visited.has('book')) {
      visited.add('book');
      setTimeout(() => {
        showNarration("I should take this with me.");
        addItem('book');
      }, 200);
    }
  });
  layer.appendChild(el);
});
</script>
</body>
</html>
