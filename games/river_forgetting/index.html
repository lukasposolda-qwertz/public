<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The River of Forgetting</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0808;font-family:'Libre Baskerville',serif}

/* ── FADE OVERLAY ── */
#fade-ov{position:fixed;inset:0;z-index:999;background:#000;opacity:1;pointer-events:none;transition:opacity .55s ease}

/* ── TITLE SCREEN ── */
#title{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1c1408 0%,#0c0a06 60%,#040404 100%)}
#title-main{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:600;color:#c8a84a;letter-spacing:.06em;text-align:center;line-height:1.2}
#title-sub{font-style:italic;font-size:clamp(.8rem,1.6vw,1rem);color:rgba(200,168,74,.45);letter-spacing:.12em;text-align:center;margin-top:.6rem}
.t-rule{width:240px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,74,.3),transparent);margin:2rem auto}
#btn-start{font-family:'Libre Baskerville',serif;font-size:1rem;letter-spacing:.14em;color:#c8a84a;background:transparent;border:1px solid rgba(200,168,74,.35);padding:.75rem 2.8rem;cursor:pointer;transition:all .22s}
#btn-start:hover{color:#e8c86a;border-color:rgba(200,168,74,.75);background:rgba(200,168,74,.05)}

/* ── GAME ── */
#game{display:none;width:100%;height:100vh;flex-direction:row}

/* ── IMAGE PANEL ── */
#image-panel{flex:0 0 67%;position:relative;background:#0a0808 center/contain no-repeat;overflow:hidden}
#hs-layer{position:absolute}
.hs{position:absolute;cursor:pointer}
.hs-ring{position:absolute;inset:0;border:1px solid transparent;transition:border-color .18s,background .18s}
.hs:hover .hs-ring{border-color:rgba(255,220,120,.42);background:rgba(255,220,120,.045)}
.hs-lbl{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(0,0,0,.74);color:#e0cfa0;font-family:'Libre Baskerville',serif;font-size:.67rem;letter-spacing:.08em;padding:3px 9px;border-radius:2px;opacity:0;transition:opacity .14s;pointer-events:none}
.hs:hover .hs-lbl{opacity:1}

/* ── CONTROLS PANEL ── */
#controls-panel{flex:1;display:flex;flex-direction:column;background:#0d0b09;border-left:1px solid rgba(200,168,74,.13)}

/* text area */
#text-area{flex:1;display:flex;flex-direction:column;padding:18px 20px 12px;cursor:pointer;border-bottom:1px solid rgba(200,168,74,.1);overflow:hidden;min-height:0}
#text-log{flex:1;overflow-y:auto;min-height:0}
#text-line{font-size:.94rem;line-height:1.78;color:#bfad7e}
#text-line .spk{display:block;font-style:normal;font-weight:700;font-size:.84rem;letter-spacing:.06em;color:#c8a84a;margin-bottom:.22rem}
#text-line .speech{font-style:italic}
#choices{display:none;flex-direction:column;gap:6px;margin-top:12px;flex-shrink:0;overflow-y:auto;max-height:220px}
.cbtn{font-family:'Libre Baskerville',serif;font-size:.82rem;color:#c4b484;background:rgba(200,168,74,.04);border:1px solid rgba(200,168,74,.22);padding:8px 13px;cursor:pointer;text-align:left;transition:all .18s;border-radius:2px}
.cbtn:hover{background:rgba(200,168,74,.1);color:#e0c86a;border-color:rgba(200,168,74,.48)}
#click-hint{flex-shrink:0;font-size:.67rem;letter-spacing:.1em;color:rgba(200,168,74,.58);text-align:right;margin-top:8px}

/* inventory */
#inv-area{flex:1;display:flex;flex-direction:column;padding:14px 16px 16px;min-height:0}
#inv-hdr{flex-shrink:0;font-size:.63rem;letter-spacing:.16em;color:rgba(200,168,74,.35);margin-bottom:12px}
#inv-items{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;overflow-y:auto}
.inv-tile{display:flex;flex-direction:column;align-items:center;padding:14px 8px 11px;border:1px solid rgba(200,168,74,.14);border-radius:4px;cursor:pointer;transition:background .18s,border-color .18s;gap:8px}
.inv-tile:hover{background:rgba(200,168,74,.07)}
.inv-tile.sel{background:rgba(200,168,74,.14);border-color:rgba(200,168,74,.5)}
.inv-tile img{width:76px;height:76px;object-fit:contain}
.inv-tile span{font-size:.74rem;color:#a89870;text-align:center;line-height:1.3}
.inv-empty{font-size:.78rem;color:rgba(200,168,74,.22);grid-column:1/-1}

/* ── CREDITS ── */
#credits{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1c1408 0%,#040404 100%);text-align:center;padding:3rem}
#credits-quote{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,2.4vw,1.65rem);font-style:italic;color:#c8a84a;letter-spacing:.04em;line-height:1.75;max-width:680px;margin-bottom:2.5rem}
#credits-title{font-size:.7rem;letter-spacing:.2em;color:rgba(200,168,74,.38);margin-bottom:2rem}
#btn-again{font-family:'Libre Baskerville',serif;font-size:.95rem;color:#c8a84a;background:transparent;border:1px solid rgba(200,168,74,.32);padding:.7rem 2.4rem;cursor:pointer;letter-spacing:.1em;transition:all .22s}
#btn-again:hover{color:#e8c86a;border-color:rgba(200,168,74,.7)}
</style>
</head>
<body>
<div id="fade-ov"></div>

<div id="title">
  <div id="title-main">The River<br>of Forgetting</div>
  <div id="title-sub">A story set in the world beneath the world</div>
  <div class="t-rule"></div>
  <button id="btn-start">Begin</button>
</div>

<div id="game">
  <div id="image-panel"><div id="hs-layer"></div></div>
  <div id="controls-panel">
    <div id="text-area">
      <div id="text-log"><div id="text-line"></div></div>
      <div id="choices"></div>
      <div id="click-hint"></div>
    </div>
    <div id="inv-area">
      <div id="inv-hdr">◈ Inventory</div>
      <div id="inv-items"><span class="inv-empty">Empty</span></div>
    </div>
  </div>
</div>

<div id="credits">
  <div id="credits-quote"></div>
  <div id="credits-title">THE RIVER OF FORGETTING</div>
  <button id="btn-again">Play Again</button>
</div>

<script>
'use strict';
// ── STATE ─────────────────────────────────────────────────────────────────────
const S = {
  inventory:[], selectedItem:null,
  flags: new Set(), visited:{},
  judgeAttempts:0, currentScene:null,
};

// ── ITEMS ─────────────────────────────────────────────────────────────────────
const ITEMS = {
  book:     {name:'Book of Myths',   icon:'assets/icon_book.png'},
  laurel:   {name:'Laurel Branch',   icon:'assets/icon_laurel.png'},
  asphodel: {name:'Asphodel Flower', icon:'assets/icon_asphodel.png'},
};

// ── DOM REFS ──────────────────────────────────────────────────────────────────
const textEl   = document.getElementById('text-line');
const hintEl   = document.getElementById('click-hint');
const choicesEl= document.getElementById('choices');
const textArea = document.getElementById('text-area');
const invPanel = document.getElementById('inv-items');
const imgPanel = document.getElementById('image-panel');
const hsLayer  = document.getElementById('hs-layer');

// ── TEXT ENGINE ───────────────────────────────────────────────────────────────
const TE = (() => {
  let q=[], doneCb=null, _busy=false, _waiting=false, _choice=false;

  function _next() {
    if (!q.length) {
      _busy=false; _waiting=false; hintEl.textContent='';
      if (doneCb){const cb=doneCb;doneCb=null;cb();}
      return;
    }
    const it=q.shift();
    if (it.k==='n'){
      textEl.innerHTML=it.t; _waiting=true;
      hintEl.textContent=q.length?'click to continue':'';
    } else if (it.k==='d'){
      textEl.innerHTML=`<span class="spk">${it.s}</span><span class="speech">${it.t}</span>`;
      _waiting=true; hintEl.textContent=q.length?'click to continue':'';
    } else if (it.k==='acq'){addItem(it.item);_next();}
    else if (it.k==='remove'){removeItem(it.item);_next();}
    else if (it.k==='flag'){S.flags.add(it.f);_next();}
    else if (it.k==='next'){
      _busy=false;_waiting=false;hintEl.textContent='';
      setTimeout(()=>goToScene(it.scene),it.delay||1800);
    } else if (it.k==='choice'){
      _choice=true; hintEl.textContent='';
      showChoices(it.opts,chosen=>{
        _choice=false; hideChoices();
        if(it.fn)it.fn(chosen);
        _next();
      });
    } else _next();
  }

  return {
    feed(lines,onDone){q=[...lines];doneCb=onDone||null;_busy=true;_waiting=false;_choice=false;hideChoices();_next();},
    prepend(lines){q=[...lines,...q];},
    advance(){if(!_waiting||_choice)return;_waiting=false;_next();},
    get busy(){return _busy;}
  };
})();

function showChoices(opts,onChoose){
  choicesEl.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='cbtn'; b.textContent=o.label;
    b.onclick=()=>onChoose(o.id);
    choicesEl.appendChild(b);
  });
  choicesEl.style.display='flex';
}
function hideChoices(){choicesEl.style.display='none';choicesEl.innerHTML='';}

textArea.addEventListener('click',e=>{
  if(e.target.closest('.cbtn'))return;
  TE.advance();
});

// ── SCENE / TRANSITION ────────────────────────────────────────────────────────
const OV=document.getElementById('fade-ov');
function fadeIn(cb){OV.style.opacity='1';OV.style.pointerEvents='auto';setTimeout(cb,560);}
function fadeOut(){OV.style.opacity='0';OV.style.pointerEvents='none';}

function goToScene(id){
  fadeIn(()=>{_load(id);setTimeout(fadeOut,120);});
}

const LOADERS={
  scene1:loadScene1,scene2:loadScene2,scene3:loadScene3,scene4:loadScene4,
  scene5:loadScene5,scene6:loadScene6,scene7:loadScene7,scene8:loadScene8,
  scene9:loadScene9,scene10:loadScene10,scene10b:loadScene10b,credits:loadCredits
};

function _load(id){
  S.currentScene=id;
  if(!S.visited[id])S.visited[id]=new Set();
  hsLayer.innerHTML='';
  textEl.innerHTML=''; hintEl.textContent='';
  hideChoices();
  S.selectedItem=null; renderInv();
  if(LOADERS[id])LOADERS[id]();
  reposHS();
}

function setBG(f){imgPanel.style.backgroundImage=`url('assets/${f}')`;}

// ── HOTSPOT HELPERS ───────────────────────────────────────────────────────────
const IMG_W=1536,IMG_H=1024;
function reposHS(){
  const pW=imgPanel.clientWidth,pH=imgPanel.clientHeight;
  const sc=Math.min(pW/IMG_W,pH/IMG_H);
  const rW=IMG_W*sc,rH=IMG_H*sc;
  hsLayer.style.left=((pW-rW)/2)+'px';
  hsLayer.style.top=((pH-rH)/2)+'px';
  hsLayer.style.width=rW+'px';
  hsLayer.style.height=rH+'px';
}
window.addEventListener('resize',reposHS);

function makeHS(id,label,x,y,w,h,fn){
  const d=document.createElement('div');
  d.className='hs';d.id='hs-'+id;
  d.style.cssText=`left:${x}%;top:${y}%;width:${w}%;height:${h}%`;
  d.innerHTML=`<div class="hs-ring"></div><div class="hs-lbl">${label}</div>`;
  d.addEventListener('click',fn);
  hsLayer.appendChild(d);
  return d;
}
function markV(hs){S.visited[S.currentScene].add(hs);}
function wasV(hs){return S.visited[S.currentScene]?.has(hs);}
function wrongItem(label){
  const n=ITEMS[S.selectedItem]?.name||'that';
  S.selectedItem=null;renderInv();
  TE.feed([{k:'n',t:`Using the ${n} on the ${label} doesn't seem to do anything.`}]);
}

// ── INVENTORY ─────────────────────────────────────────────────────────────────
function addItem(id){if(!S.inventory.includes(id)){S.inventory.push(id);renderInv();}}
function removeItem(id){
  const i=S.inventory.indexOf(id);
  if(i>=0)S.inventory.splice(i,1);
  if(S.selectedItem===id)S.selectedItem=null;
  renderInv();
}
function renderInv(){
  invPanel.innerHTML='';
  if(!S.inventory.length){invPanel.innerHTML='<span class="inv-empty">Empty</span>';return;}
  S.inventory.forEach(id=>{
    const it=ITEMS[id];
    const d=document.createElement('div');
    d.className='inv-tile'+(S.selectedItem===id?' sel':'');
    d.innerHTML=`<img src="${it.icon}" alt="${it.name}"><span>${it.name}</span>`;
    d.onclick=()=>{
      if(S.selectedItem===id){S.selectedItem=null;}
      else{S.selectedItem=id;textEl.innerHTML=`Use <em>${it.name}</em> on…`;hintEl.textContent='';}
      renderInv();
    };
    invPanel.appendChild(d);
  });
}

// ── SCENE 1: BEDROOM ─────────────────────────────────────────────────────────
function loadScene1(){
  setBG('scene1_bedroom.png');
  TE.feed([
    {k:'n',t:`Something pulled me out of sleep before the sun. Not a sound, not a dream — just a feeling. Like I'd lost something in the night and my body knew before my mind did.`},
    {k:'n',t:`My name is Yiannis. I'm twelve. I live on a small island in the Cyclades. My mother died two years ago. I know this. I remember the funeral, the neighbours, my father sitting very still.`},
    {k:'n',t:`But this morning that knowledge feels lighter. Like it's losing weight. I should look around.`},
  ]);

  makeHS('window','Window',0,5,22,68,()=>{
    if(TE.busy)return;
    if(!wasV('window')){markV('window');
      TE.feed([
        {k:'n',t:`Blue sea, flat as glass. The sun's coming up behind the hills and turning everything gold. A couple of fishing boats already heading out.`},
        {k:'n',t:`My father's out there. He leaves before dawn now — up earlier, home later, as if the house gets harder to be in every month.`},
      ]);
    }else TE.feed([{k:'n',t:`The sea. My father's out there somewhere. I can't tell from here if he's okay.`}]);
  });

  makeHS('book','Old book',26,22,18,55,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('book');return;}
    if(!wasV('book')){markV('book');
      TE.feed([
        {k:'n',t:`A worn paperback on the shelf. "Myths of the Greeks" — my mother's copy since before I was born. Cracked spine, pencil marks in the margins.`},
        {k:'n',t:`She used to read to me from this every night. Theseus. Odysseus. Persephone dragged into the Underworld while her mother searched the earth for her.`},
        {k:'n',t:`I remember that. Not just the fact — the actual feeling. Her voice doing the characters. She made the Cyclops sound stupid and funny. That memory is still here. Why is this one still here?`},
        {k:'n',t:`I should take this with me.`},
        {k:'acq',item:'book'},
      ],scene1Check);
    }else TE.feed([{k:'n',t:`Mom's book. I can still feel her in the pencil marks, the cracked spine. I'm not letting go of this.`}]);
  });

  makeHS('bed','My bed',45,12,30,56,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('bed');return;}
    if(!wasV('bed')){markV('bed');
      TE.feed([
        {k:'n',t:`Same blue sheets, same dent in the pillow. My mother used to sit right here on the edge every night. She'd sit down and the mattress would dip, and I'd roll slightly toward her. And then she'd —`},
        {k:'n',t:`And then she'd what? The next part is gone. Like a page torn from a book. She did something important every single night, and I can't reach it.`},
      ]);
    }else TE.feed([{k:'n',t:`The same dent in the mattress. I keep thinking if I stare at it the memory will come back. It doesn't.`}]);
  });

  makeHS('photo','Photo of Mum',46,62,20,28,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('photo');return;}
    if(!wasV('photo')){markV('photo');
      TE.feed([
        {k:'n',t:`A framed photo on the nightstand. My mother — Maria. Dark hair, wide smile, laughing at something my father said. I can describe every detail.`},
        {k:'n',t:`But I can't feel it. I look at this photo and it's like looking at a stranger. I know the facts: that's my mother, she loved me, she died. But the warmth — the thing that makes you miss someone instead of just knowing they're gone — it's not there.`},
        {k:'n',t:`It's like someone reached in while I was sleeping and scooped it out.`},
      ],scene1Check);
    }else TE.feed([{k:'n',t:`Mom's photo. Her face is right there. But it's just a face.`}]);
  });

  makeHS('flower','Dried herb',76,3,17,33,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('dried herb');return;}
    if(!wasV('flower')){markV('flower');
      TE.feed([
        {k:'n',t:`A small dried herb in a clay vase on the wall shelf. My mother picked this from the hills above the village and put it here. She said something about why she was keeping it.`},
        {k:'n',t:`I can see the moment — her hand placing it, her mouth moving, her face turned toward me. But the sound is off. Like watching a video on mute. She said something important and I can't hear a word.`},
      ],scene1Check);
    }else TE.feed([{k:'n',t:`The dried herb. Still no sound. Still that silent film of her hand and her mouth.`}]);
  });

  makeHS('door','Front door',93,20,7,65,()=>{
    if(TE.busy)return;
    if(!scene1Ready()){
      TE.feed([{k:'n',t:`I should look around first. Something is wrong and I need to understand what before I go anywhere.`}]);
      return;
    }
    TE.feed([
      {k:'n',t:`Enough. I can't sit here while the memories drain. I need to talk to someone.`},
      {k:'n',t:`Daphne. Our neighbour. She's old and strange and talks to her plants. But she knew my mother, and my mother liked her — which says something.`},
      {k:'n',t:`I'm going next door.`},
      {k:'next',scene:'scene2'},
    ]);
  });
}
function scene1Ready(){return wasV('photo')&&wasV('flower')&&S.inventory.includes('book');}
function scene1Check(){/* called after required items — hint if door not ready yet */}

// ── SCENE 2: DAPHNE'S GARDEN ──────────────────────────────────────────────────
function loadScene2(){
  setBG('scene2_garden.png');
  TE.feed([
    {k:'n',t:`Outside, the morning air smells like thyme and salt. Daphne's garden is a lot — it always has been. Laurel everywhere. Trees, bushes, saplings on every ledge. The air tastes green.`},
    {k:'n',t:`She's kneeling in the dirt, her back to me. Even from here I can tell she already knows I'm coming.`},
  ]);

  makeHS('laurel','Laurel trees',0,0,22,72,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('laurel trees');return;}
    const post=S.flags.has('daphneRevealed');
    if(post&&!wasV('laurel_post')){markV('laurel_post');
      TE.feed([
        {k:'n',t:`Her trees. Her echoes — dozens of versions of what she used to be, growing all around her house.`},
        {k:'n',t:`She's surrounded herself with the thing she was turned into. I don't know if that's comforting or heartbreaking.`},
      ]);
    }else if(!wasV('laurel')){markV('laurel');
      TE.feed([
        {k:'n',t:`I've walked past this garden my whole life and never thought about how extreme it is. Most people grow tomatoes, lemon trees. Daphne grows laurel like it's her mission.`},
        {k:'n',t:`My mother once said it was odd. "It's like she's taking care of family." I thought she was being funny.`},
      ]);
    }else TE.feed([{k:'n',t:`The laurel trees rustle softly. There's almost no wind.`}]);
  });

  makeHS('bench','Stone bench',23,38,32,20,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('bench');return;}
    if(!wasV('bench')){markV('bench');
      TE.feed([
        {k:'n',t:`An old stone bench, worn smooth. Something is carved into the seat — letters, very faded. Greek letters in an ancient style. ΔΑΦΝΗ.`},
        {k:'n',t:`Daphne. Her name, in a script that's been out of use for two thousand years. How old is this bench?`},
      ]);
    }else TE.feed([{k:'n',t:`The bench with her name carved in ancient Greek. I'm starting to think my mother wasn't joking about Daphne being "as old as the trees."`}]);
  });

  makeHS('shrine','Small shrine',72,22,24,38,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('shrine');return;}
    if(S.flags.has('daphneRevealed')&&!wasV('shrine_post')){markV('shrine_post');
      TE.feed([
        {k:'n',t:`Now I understand. These aren't offerings she made — they're offerings others made to her. Long ago, when she was the tree and the tree was sacred to Apollo.`},
        {k:'n',t:`She kept them. All these centuries. Like old letters from someone you used to love.`},
      ]);
    }else if(!wasV('shrine')){markV('shrine');
      TE.feed([
        {k:'n',t:`A small stone shelf at the base of the biggest laurel tree. A clay cup of oil, a dried wreath, coins green with age. Like the offerings at ancient sites.`},
        {k:'n',t:`But this is in someone's garden. Who is Daphne making offerings to?`},
      ]);
    }else TE.feed([{k:'n',t:`The ancient offerings at the ancient tree.`}]);
  });

  makeHS('daphne','Daphne',28,60,40,36,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('Daphne');return;}
    if(S.flags.has('scene2Complete')){
      TE.feed([{k:'n',t:`She's back in the dirt. The conversation is over. The gate is open.`}]);
      return;
    }
    if(!S.flags.has('daphneConvStarted')){
      S.flags.add('daphneConvStarted');
      runDaphneConv();
    }
  });

  makeHS('gate','Path to the ferry',36,2,28,26,()=>{
    if(TE.busy)return;
    if(!S.flags.has('scene2Complete')){TE.feed([{k:'n',t:`I'm not done here yet.`}]);return;}
    TE.feed([
      {k:'n',t:`I look back once. Daphne is working the earth again, her bark-brown hands moving in the dirt like they've been doing the same thing for three thousand years.`},
      {k:'n',t:`She doesn't say goodbye. Maybe when you're that old, you stop bothering.`},
      {k:'n',t:`I hold the laurel branch tight, put the book under my arm, and walk toward the harbour.`},
      {k:'next',scene:'scene3'},
    ]);
  });
}

function runDaphneConv(){
  TE.feed([
    // approach
    {k:'n',t:`I walk toward her. She's pressing her fingers into the dark earth. She doesn't turn around.`},
    {k:'d',s:'Daphne',t:`You're up early, Yiannis. And you walked here with a question. I can hear it in your steps.`},
    {k:'d',s:'Yiannis',t:`Something's wrong. I can't remember my mother properly. Not the facts — I know the facts. But the feeling of her. The sound of her voice. It's just gone.`},
    {k:'n',t:`Now she turns. Slowly. Her skin has a texture that isn't quite skin — around her temples, faint ridges, like wood grain. Her eyes are dark and very bright.`},
    {k:'d',s:'Daphne',t:`Ah. There it is. The hollow look. I was wondering when it would reach this island.`},
    {k:'d',s:'Yiannis',t:`You know what this is?`},
    {k:'d',s:'Daphne',t:`Sit down, boy.`},
    // explanation
    {k:'d',s:'Daphne',t:`The rivers beneath the earth. You know about them from your mother's book. The Styx. The Acheron. And Lethe.`},
    {k:'d',s:'Yiannis',t:`The river of forgetting.`},
    {k:'d',s:'Daphne',t:`It's meant to be a mercy — the dead drink from it before rebirth, washing away the weight of the old life. But Lethe doesn't behave. It wants to dissolve things.`},
    {k:'n',t:`She looks at her hands. In the morning light they're unmistakable — fingers tapering like twigs, skin ridged like bark.`},
    {k:'d',s:'Daphne',t:`Something is redirecting the water upward, into the world of the living. It dissolves the fragile parts first. Not the facts — the feelings. The texture of a voice. The warmth of a hand.`},
    {k:'d',s:'Yiannis',t:`That's exactly what's happening to me.`},
    {k:'d',s:'Daphne',t:`I can feel it myself. The tree in me has roots that go deeper than you'd think. The water is rising.`},
    {k:'d',s:'Yiannis',t:`Why would someone do that?`},
    {k:'d',s:'Daphne',t:`I can't see into the Underworld from up here. But I know the entrance: Cape Tainaron, southern tip of the Peloponnese. Take the ferry to Piraeus, then a bus south.`},
    // choice 1
    {k:'choice',opts:[
      {id:'a',label:`"Daphne… what do you mean, 'the tree in you'?"`},
      {id:'b',label:`"Is this happening everywhere, not just here?"`},
      {id:'c',label:`"How do you know so much about the Underworld?"`},
    ],fn:chosen=>{
      S.flags.add('daphneRevealed');
      if(chosen==='a') TE.prepend([
        {k:'d',s:'Daphne',t:`Your mother's book. There's a story in it. About a young woman chased by a god.`},
        {k:'d',s:'Yiannis',t:`Apollo and Daphne. She didn't want him. She prayed to be saved and was turned into a —`},
        {k:'n',t:`I stop. The bark-skin. The garden full of laurel. The stone bench with her name carved in letters two thousand years old.`},
        {k:'d',s:'Yiannis',t:`That was you.`},
      ]);
      else if(chosen==='b') TE.prepend([
        {k:'d',s:'Daphne',t:`Near the old places on the mainland people have been losing memories. Always about the dead. Always the feelings, not the facts.`},
        {k:'n',t:`She holds up her hands. The bark-grain is unmistakable in the sunlight.`},
        {k:'d',s:'Daphne',t:`I know because I am very, very old, Yiannis. Older than this island's name.`},
        {k:'d',s:'Yiannis',t:`Apollo and Daphne. The girl who became a laurel tree.`},
        {k:'d',s:'Daphne',t:`That's me.`},
      ]);
      else TE.prepend([
        {k:'d',s:'Daphne',t:`Because I lived through the age when the Underworld wasn't a story. When a girl could be turned into a tree because a god wanted her and she said no.`},
        {k:'n',t:`Her hands in the light. The bark texture. The twig-like fingers. All those laurel trees.`},
        {k:'d',s:'Yiannis',t:`You're the Daphne. From the myth.`},
      ]);
    }},
    // Daphne's story
    {k:'d',s:'Daphne',t:`Apollo wanted me. I didn't want him. I prayed to be saved, and the earth turned me into a laurel tree.`},
    {k:'n',t:`She says it simply. Like last week's weather.`},
    {k:'d',s:'Daphne',t:`Centuries as a tree. Rooted, silent, aware but unable to move. People left offerings. They said I was sacred to Apollo, which was the cruellest joke — he got to claim me anyway, just in a different form.`},
    {k:'d',s:'Daphne',t:`I grew back. Very slowly. A finger that moved, a voice eventually. It's never been complete. The tree is still in me.`},
    {k:'n',t:`The old woman who brought casseroles when my mother died. She is a person from my mother's book.`},
    {k:'d',s:'Yiannis',t:`Does anyone else know?`},
    {k:'d',s:'Daphne',t:`Your mother guessed, I think. She'd look at me sometimes with this expression — amused and sad at once. She was perceptive, your mother. She saw things others didn't.`},
    {k:'n',t:`A sharp ache in my chest. That sounds exactly like her.`},
    // mission
    {k:'d',s:'Daphne',t:`But enough of old stories. You have to go down there, Yiannis.`},
    {k:'d',s:'Yiannis',t:`The actual Underworld?`},
    {k:'d',s:'Daphne',t:`Find the source of the leak. Stop it, or find whoever is causing it and convince them to stop.`},
    // choice 2
    {k:'choice',opts:[
      {id:'a',label:`"Why me? I'm twelve."`},
      {id:'b',label:`"What happens if I don't go?"`},
    ],fn:chosen=>{
      if(chosen==='a') TE.prepend([
        {k:'d',s:'Daphne',t:`Because you noticed. Most adults who lose these memories don't realise it — they feel lighter one day and call it healing. You woke up and knew immediately something had been taken. That refusal to let go is exactly what you'll need down there.`},
      ]);
      else TE.prepend([
        {k:'d',s:'Daphne',t:`Tomorrow a little more will be gone. A detail here, a feeling there. The sound of her laugh. The weight of her hand on your head.`},
        {k:'d',s:'Daphne',t:`One day you'll look at that photo and feel nothing. And the worst part is, you won't mind. That's what Lethe does. It makes you not mind the taking.`},
        {k:'n',t:`That's the worst thing anyone has ever said to me.`},
      ]);
    }},
    // laurel branch
    {k:'n',t:`Daphne stands slowly — her joints creak like settling wood — and walks to the largest laurel tree. She breaks off a small fresh sprig. I notice her wince.`},
    {k:'d',s:'Daphne',t:`Here. My own wood, you could say.`},
    {k:'d',s:'Daphne',t:`It won't protect you from gods or monsters. But the Underworld makes the living forget who they are and why they came. This will hold you together.`},
    {k:'acq',item:'laurel'},
    {k:'d',s:'Daphne',t:`Walk into the cave at Cape Tainaron. Keep walking. You'll know when you've crossed over.`},
    {k:'d',s:'Yiannis',t:`Will I come back?`},
    {k:'d',s:'Daphne',t:`Orpheus came back. Heracles. Odysseus. They all came back.`},
    {k:'n',t:`A pause.`},
    {k:'d',s:'Daphne',t:`But they all came back different.`},
    {k:'n',t:`She turns away and kneels back into the dirt. The garden gate is ahead. The ferry leaves in an hour.`},
    {k:'flag',f:'scene2Complete'},
  ]);
}

function runJudgePuzzle(){
  TE.feed([
    {k:'n',t:`Three memories appear before you. Which one is truly yours?`},
    {k:'choice',opts:[
      {id:'A',label:`Memory A — A woman in a kitchen, warm light, the smell of bread. Her face is clear, sharp, perfect.`},
      {id:'B',label:`Memory B — A woman on a beach, laughing, holding a child's hand. Every detail crisp, like a painting.`},
      {id:'C',label:`Memory C — Only a voice, humming a tune. No face. No image at all. Just a sound, and a feeling of absolute safety.`},
    ],fn:chosen=>{
      if(chosen==='C'){
        TE.prepend([
          {k:'d',s:'Aeacus',t:`Yes. That one. No image, no certainty — just a feeling. That is what the living keep of the dead. The real thing.`},
          {k:'d',s:'Minos',t:`You may pass.`},
          {k:'n',t:`The bronze gate opens, slowly. Beyond it, the path descends further.`},
          {k:'flag',f:'judgePassed'},
          {k:'next',scene:'scene8',delay:2000},
        ]);
      }else{
        S.judgeAttempts++;
        if(S.judgeAttempts>=3){
          TE.prepend([
            {k:'d',s:'Aeacus',t:`You struggle. The river's influence is already working. Pass anyway — but be warned: you may not have full strength for what comes next.`},
            {k:'flag',f:'judgePassed'},{k:'flag',f:'judgeFailed'},
            {k:'next',scene:'scene8',delay:2000},
          ]);
        }else{
          const wrongText=chosen==='A'
            ?`That is a fabrication. Too perfect. Real memories are never that sharp.`
            :`Also false. The Lethe water creates images like this — composed, posed, too complete. Try again.`;
          const wrongSpk=chosen==='A'?'Minos':'Rhadamanthys';
          TE.prepend([
            {k:'d',s:wrongSpk,t:wrongText},
            {k:'n',t:`I need to think again.`},
            // re-present puzzle
            {k:'n',t:`Three memories. Which one is truly yours?`},
            {k:'choice',opts:[
              {id:'A',label:`Memory A — A woman in a kitchen, warm light, the smell of bread. Her face is clear, sharp, perfect.`},
              {id:'B',label:`Memory B — A woman on a beach, laughing, holding a child's hand. Every detail crisp, like a painting.`},
              {id:'C',label:`Memory C — Only a voice, humming a tune. No face. No image at all. Just a sound, and a feeling of absolute safety.`},
            ],fn:chosen2=>{
              if(chosen2==='C'){
                TE.prepend([
                  {k:'d',s:'Aeacus',t:`Yes. That one.`},
                  {k:'d',s:'Minos',t:`You may pass.`},
                  {k:'flag',f:'judgePassed'},
                  {k:'next',scene:'scene8',delay:1800},
                ]);
              }else{
                S.judgeAttempts++;
                TE.prepend([
                  {k:'d',s:'Aeacus',t:`You struggle. The river's influence is already working. Pass anyway.`},
                  {k:'flag',f:'judgePassed'},{k:'flag',f:'judgeFailed'},
                  {k:'next',scene:'scene8',delay:2000},
                ]);
              }
            }},
          ]);
        }
      }
    }},
  ]);
}

// ── SCENE 8: RIVER LETHE / MELINOE ───────────────────────────────────────────
function loadScene8(){
  setBG('scene8_lethe.png');
  TE.feed([
    {k:'n',t:`The path ends at a vast still river. The water is clear but somehow empty — looking at it, I feel my thoughts start to drift. Lethe. The river of forgetting.`},
    {k:'n',t:`Along the bank there's a visible crack in the rocky ground where water wells up and flows upward through a fissure. And standing near it — a figure. Half pale, half dark.`},
    {k:'n',t:`She sees me and isn't surprised.`},
    {k:'d',s:'Melinoe',t:`Another one. They always come eventually.`},
    {k:'d',s:'Yiannis',t:`You're the one redirecting the Lethe water.`},
    {k:'d',s:'Melinoe',t:`Your mother. She's somewhere in the Meadows. Do you know what she does? She stands still and whispers your name. Over and over. The dead can't rest because the living won't let them.`},
    {k:'d',s:'Melinoe',t:`I am Melinoe. Persephone's daughter. My job is the restless dead. I redirected the river to ease the weight. For both sides.`},
    {k:'d',s:'Yiannis',t:`You can't just take our memories.`},
    {k:'d',s:'Melinoe',t:`Can't I? Tell me why not.`},
    {k:'flag',f:'melinoeIntroDone'},
  ]);

  makeHS('lethe_river','River Lethe',0,68,58,27,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('river');return;}
    if(!wasV('lethe')){markV('lethe');
      TE.feed([
        {k:'n',t:`The river of forgetting. Looking at it, something in me wants to just sit down and let the sound of it wash over me.`},
        {k:'n',t:`I grip the laurel branch tighter. It holds.`},
      ]);
    }else TE.feed([{k:'n',t:`The Lethe. Still and dangerous. I'm keeping my grip on the branch.`}]);
  });

  makeHS('crack','The fissure',20,50,28,16,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('fissure');return;}
    if(!wasV('crack')){markV('crack');
      TE.feed([
        {k:'n',t:`A crack in the rocky ground, glowing faintly. The Lethe water seeps upward through it, flowing toward the surface world.`},
        {k:'n',t:`This is what's stealing the memories. One thin crack. It seems too small for the damage it's doing.`},
      ]);
    }else TE.feed([{k:'n',t:`The fissure. The water still seeping upward.`}]);
  });

  makeHS('melinoe','Melinoe',62,5,28,78,()=>{
    if(TE.busy)return;
    if(S.selectedItem){wrongItem('Melinoe');return;}
    if(!S.flags.has('melinoeIntroDone')){
      TE.feed([{k:'d',s:'Melinoe',t:`I'm listening.`}]);return;
    }
    if(S.flags.has('melinoePersuaded')){
      TE.feed([{k:'n',t:`The fissure is sealed. She stands by the river, watching it.`}]);return;
    }
    runMelinoeArgs();
  });
}

function runMelinoeArgs(){
  const opts=[];
  if(S.flags.has('sisyphusKnows')&&!S.flags.has('sisyphusArgMade'))
    opts.push({id:'sisyphus',label:`"Sisyphus forgot why he was punished. That wasn't mercy — it was meaningless suffering."`});
  if(S.flags.has('eurydiceHeard')&&!S.flags.has('eurydiceArgMade'))
    opts.push({id:'eurydice',label:`"Eurydice chose to stay. But it was her choice — you're choosing for everyone."`});
  if(S.flags.has('charonCrossed')&&!S.flags.has('charonArgMade'))
    opts.push({id:'charon',label:`"Charon asked me how Daphne was doing. A small memory, freely given. That wasn't a chain — that was kindness."`});
  if(S.flags.has('eurydiceArgMade')&&S.flags.has('charonArgMade')&&!S.flags.has('finalArgMade'))
    opts.push({id:'final',label:`"My memory of my mother isn't a picture. It's a song I can barely hear. That's not a chain — that's love."`});

  if(!opts.length){
    TE.feed([{k:'d',s:'Melinoe',t:`You haven't made your case yet. I'm still listening.`}]);return;
  }

  TE.feed([{k:'choice',opts,fn:argId=>{
    if(argId==='sisyphus'){
      TE.prepend([
        {k:'flag',f:'sisyphusArgMade'},
        {k:'d',s:'Melinoe',t:`Sisyphus is different. His punishment exists to teach something. But what about the dead who suffer only because the living won't release them? No lesson. Just chains made of love.`},
      ]);
    }else if(argId==='eurydice'){
      TE.prepend([
        {k:'n',t:`Something changes in her face.`},
        {k:'d',s:'Melinoe',t:`Eurydice…`},
        {k:'n',t:`She goes quiet. She hadn't thought of it that way. She's been doing the same thing she accuses the living of — imposing her will on both sides without asking.`},
        {k:'flag',f:'eurydiceArgMade'},
      ]);
    }else if(argId==='charon'){
      TE.prepend([
        {k:'d',s:'Melinoe',t:`Charon asked about her?`},
        {k:'n',t:`She looks almost wistful.`},
        {k:'d',s:'Melinoe',t:`Perhaps… yes. There is remembering that holds, and remembering that harms. I have seen only the second kind for so long.`},
        {k:'flag',f:'charonArgMade'},
      ]);
    }else if(argId==='final'){
      TE.prepend([
        {k:'n',t:`Melinoe looks at me for a long time.`},
        {k:'d',s:'Melinoe',t:`A song you can barely hear.`},
        {k:'n',t:`She looks at the crack. Then she kneels and places both hands over the fissure. The water recedes. The glow fades. The crack seals.`},
        {k:'d',s:'Melinoe',t:`Carry a message for me. Tell the living: remember us. But let us rest.`},
        {k:'n',t:`She stands. Not happy exactly. But less tired.`},
        {k:'flag',f:'melinoePersuaded'},
        {k:'next',scene:'scene9',delay:2500},
      ]);
    }
  }}]);
}

// ── SCENE 9: THE ASCENT (cutscene) ────────────────────────────────────────────
function loadScene9(){
  setBG('scene4_meadows.png');
  TE.feed([
    {k:'n',t:`The way back is lighter. Not easier — but lighter.`},
    {k:'n',t:`I pass through the Meadows. Elpenor sees me coming.`},
    {k:'d',s:'Elpenor',t:`You're going back up. You actually did it. Tell someone about me — Elpenor, sailed with Odysseus. Please.`},
    {k:'n',t:`The Styx crossing. Charon nods at me once. No words. He pushes off from the bank. The living shore gets closer.`},
    {k:'n',t:`The cave. And then — light. Real light. The sun at Cape Tainaron, low in the afternoon sky.`},
    {k:'next',scene:'scene10',delay:2000},
  ]);
}

// ── SCENE 10: HOME — DAPHNE'S GARDEN ─────────────────────────────────────────
function loadScene10(){
  setBG('scene2_garden.png');
  TE.feed([
    {k:'n',t:`The ferry home takes four hours. I sit on the deck with the book in my lap.`},
    {k:'n',t:`Daphne is in her garden when I arrive. She seems unsurprised.`},
  ]);

  makeHS('daphne_return','Daphne',28,60,40,36,()=>{
    if(TE.busy)return;
    if(S.flags.has('asphodelGiven')){
      TE.feed([{k:'n',t:`She holds the flower, looking at it. Our conversation is done.`}]);return;
    }
    if(!S.inventory.includes('asphodel')){
      TE.feed([{k:'n',t:`I should give her something from the Meadows. I picked a flower — it's still in my inventory.`}]);return;
    }
    TE.feed([
      {k:'d',s:'Daphne',t:`You went all the way down for a memory. Was it worth it?`},
      {k:'n',t:`I give her the asphodel flower. She holds it carefully, like something precious.`},
      {k:'remove',item:'asphodel'},
      {k:'d',s:'Daphne',t:`From the Meadows. You picked this yourself.`},
      {k:'d',s:'Yiannis',t:`She has a message. From Melinoe. "Remember us. But let us rest."`},
      {k:'n',t:`Daphne closes her fingers around the flower very slowly.`},
      {k:'d',s:'Daphne',t:`Go home, Yiannis.`},
      {k:'flag',f:'asphodelGiven'},
      {k:'next',scene:'scene10b',delay:2000},
    ]);
  });
}

// ── SCENE 10b: BEDROOM AT SUNSET (cutscene) ───────────────────────────────────
function loadScene10b(){
  setBG('scene10_home.png');
  TE.feed([
    {k:'n',t:`My room. Sunset light coming through the window.`},
    {k:'n',t:`I look at the photo. My mother's face. For a moment — nothing.`},
    {k:'n',t:`Then, quietly: a sound. Not with my ears. Inside. A humming. A melody. Her song.`},
    {k:'n',t:`I can't see her face completely. It doesn't fully come back. But I can hear her. That's enough.`},
    {k:'n',t:`I hum along. The sun sets. The sea goes dark.`},
    {k:'next',scene:'credits',delay:2500},
  ]);
}

// ── CREDITS ───────────────────────────────────────────────────────────────────
function loadCredits(){
  document.getElementById('game').style.display='none';
  const cr=document.getElementById('credits');
  cr.style.display='flex';
  cr.style.opacity='0';
  cr.style.transition='opacity 1.2s ease';
  document.getElementById('credits-quote').textContent=
    `The Greek word for truth is aletheia — literally, "un-forgetting." To know what is true, you must first refuse to forget.`;
  setTimeout(()=>{cr.style.opacity='1';},100);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click',()=>{
  OV.style.opacity='1';
  setTimeout(()=>{
    document.getElementById('title').style.display='none';
    document.getElementById('game').style.display='flex';
    _load('scene1');
    setTimeout(fadeOut,120);
  },560);
});

document.getElementById('btn-again').addEventListener('click',()=>{
  // Reset state
  S.inventory.length=0; S.selectedItem=null;
  S.flags.clear(); S.visited={};
  S.judgeAttempts=0; S.currentScene=null;
  document.getElementById('credits').style.display='none';
  document.getElementById('game').style.display='flex';
  OV.style.opacity='1';
  setTimeout(()=>{_load('scene1');setTimeout(fadeOut,120);},560);
});
</script>
