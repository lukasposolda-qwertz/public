let currentIndex = 0;
let score = 0;
let answered = false;

function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentIndex, score }));
}

function loadProgress() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && typeof saved.currentIndex === 'number' && saved.currentIndex < quizData.length) {
      return saved;
    }
  } catch(e) {}
  return null;
}

function renderQuestion() {
  const q = quizData[currentIndex];
  answered = false;

  document.getElementById('progressText').textContent = `Fråga ${currentIndex + 1} av ${quizData.length}`;
  document.getElementById('progressBar').style.width = `${(currentIndex / quizData.length) * 100}%`;
  document.getElementById('typeBadge').textContent = q.type === 'multi' ? 'Välj alla som stämmer' : 'Välj ett svar';
  document.getElementById('questionText').textContent = q.q;

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    const input = document.createElement('input');
    input.type = q.type === 'multi' ? 'checkbox' : 'radio';
    input.name = 'option';
    input.value = i;
    input.className = 'option-input';
    input.addEventListener('change', () => {
      if (q.type === 'single') {
        document.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
      }
      label.classList.toggle('selected', input.checked);
    });
    const text = document.createElement('span');
    text.className = 'option-text';
    text.textContent = opt.t;
    label.appendChild(input);
    label.appendChild(text);
    list.appendChild(label);
  });

  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'none';
  fb.className = 'feedback-box';

  document.getElementById('checkBtn').style.display = 'inline-block';
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('nextBtn').style.display = 'none';
}

function checkAnswer() {
  if (answered) return;
  const q = quizData[currentIndex];
  const inputs = document.querySelectorAll('.option-input');
  const labels = document.querySelectorAll('.option-label');
  const selected = [];
  inputs.forEach((inp, i) => { if (inp.checked) selected.push(i); });
  if (selected.length === 0) return;

  answered = true;
  inputs.forEach(inp => inp.disabled = true);
  labels.forEach(l => l.classList.add('disabled'));

  const correctIndices = q.opts.reduce((acc, opt, i) => { if (opt.c) acc.push(i); return acc; }, []);
  const isFullyCorrect = selected.length === correctIndices.length && selected.every(i => correctIndices.includes(i));
  const isPartial = !isFullyCorrect && selected.some(i => correctIndices.includes(i)) && !selected.some(i => !correctIndices.includes(i));

  labels.forEach((label, i) => {
    if (correctIndices.includes(i)) {
      label.classList.add('correct');
    } else if (selected.includes(i)) {
      label.classList.add('incorrect');
    }
  });

  const fb = document.getElementById('feedbackBox');
  const verdict = document.getElementById('feedbackVerdict');
  const ftxt = document.getElementById('feedbackText');

  if (isFullyCorrect) {
    score++;
    fb.className = 'feedback-box correct';
    verdict.textContent = 'Rätt!';
  } else if (isPartial) {
    fb.className = 'feedback-box partial';
    verdict.textContent = 'Delvis rätt';
  } else {
    fb.className = 'feedback-box incorrect';
    verdict.textContent = 'Fel';
  }

  ftxt.textContent = q.fb;
  fb.style.display = 'block';

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';

  saveProgress();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= quizData.length) {
    showResults();
  } else {
    renderQuestion();
    saveProgress();
  }
}

function showResults() {
  localStorage.removeItem(STORAGE_KEY);
  const pct = Math.round((score / quizData.length) * 100);
  document.getElementById('progressText').textContent = `Klar! ${quizData.length} av ${quizData.length}`;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('questionCard').innerHTML = `
    <div class="results-screen">
      <div class="results-title">Quiz klart!</div>
      <div class="results-score">${score}/${quizData.length}</div>
      <div class="results-label">${pct}% rätt – ${pct >= 80 ? 'Utmärkt!' : pct >= 60 ? 'Bra jobbat!' : 'Fortsätt öva!'}</div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn" onclick="restartQuiz()">Gör om quizet</button>
      </div>
    </div>`;
}

function restartQuiz() {
  currentIndex = 0;
  score = 0;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('questionCard').innerHTML = `
    <div class="question-type-badge" id="typeBadge"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="btn-row">
      <button class="btn" id="checkBtn" onclick="checkAnswer()">Kontrollera</button>
      <button class="btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Nästa fråga →</button>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-verdict" id="feedbackVerdict"></div>
      <div id="feedbackText"></div>
    </div>`;
  renderQuestion();
}

// Init
const saved = loadProgress();
if (saved && saved.currentIndex > 0) {
  const resume = document.getElementById('questionCard');
  resume.innerHTML = `
    <div class="resume-screen">
      <div class="resume-title">Fortsätt där du slutade?</div>
      <div class="resume-info">Du är på fråga ${saved.currentIndex + 1} av ${quizData.length}</div>
      <div class="resume-score">Poäng hittills: ${saved.score} rätt</div>
      <div class="btn-row" style="justify-content:center;gap:1rem">
        <button class="btn" onclick="resumeQuiz(${saved.currentIndex}, ${saved.score})">Fortsätt</button>
        <button class="btn btn-outline" onclick="restartQuiz()">Börja om</button>
      </div>
    </div>`;
} else {
  renderQuestion();
}

function resumeQuiz(idx, sc) {
  currentIndex = idx;
  score = sc;
  document.getElementById('questionCard').innerHTML = `
    <div class="question-type-badge" id="typeBadge"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="btn-row">
      <button class="btn" id="checkBtn" onclick="checkAnswer()">Kontrollera</button>
      <button class="btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Nästa fråga →</button>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-verdict" id="feedbackVerdict"></div>
      <div id="feedbackText"></div>
    </div>`;
  renderQuestion();
}
</script>
</body>
</html>
