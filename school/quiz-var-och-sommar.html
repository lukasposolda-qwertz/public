let currentQuestion = 0;
let score = 0;
let answers = [];

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return false;
    const p = JSON.parse(saved);
    if (p.currentQuestion >= quizData.length) return false;
    currentQuestion = p.currentQuestion;
    score = p.score;
    answers = p.answers || [];
    return true;
  } catch(e) { return false; }
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ currentQuestion, score, answers }));
  } catch(e) {}
}

function clearProgress() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

function showResume(q, sc) {
  const card = document.getElementById('questionCard');
  card.innerHTML = `
    <div class="resume-screen">
      <div class="resume-title">Fortsätt där du slutade?</div>
      <div class="resume-info">Du har kommit till fråga ${q} av ${quizData.length}</div>
      <div class="resume-score">${sc} rätt hittills</div>
      <div class="btn-row" style="justify-content:center">
        <button class="btn" onclick="continueQuiz()">Fortsätt</button>
        <button class="btn btn-outline" onclick="restartQuiz()">Börja om</button>
      </div>
    </div>`;
}

function continueQuiz() { renderQuestion(); }

function restartQuiz() {
  clearProgress();
  currentQuestion = 0; score = 0; answers = [];
  renderCard();
  renderQuestion();
}

function renderCard() {
  document.getElementById('questionCard').innerHTML = `
    <div class="question-type-badge" id="typeBadge"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-list" id="optionsList"></div>
    <div class="btn-row">
      <button class="btn" id="checkBtn" onclick="checkAnswer()">Kontrollera</button>
      <button class="btn" id="nextBtn" style="display:none" onclick="nextQuestion()">Nästa fråga &rarr;</button>
    </div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-verdict" id="feedbackVerdict"></div>
      <div id="feedbackText"></div>
    </div>`;
}

function renderQuestion() {
  const total = quizData.length;
  document.getElementById('progressText').textContent = `Fråga ${currentQuestion + 1} av ${total}`;
  document.getElementById('progressBar').style.width = `${(currentQuestion / total) * 100}%`;

  const q = quizData[currentQuestion];
  document.getElementById('typeBadge').textContent =
    q.type === 'multi'
      ? 'Flerval – ett eller flera alternativ kan vara rätta'
      : 'Enval – välj ett alternativ';
  document.getElementById('questionText').textContent = `${currentQuestion + 1}. ${q.question || q.q}`;

  const list = document.getElementById('optionsList');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const label = document.createElement('label');
    label.className = 'option-label';
    label.dataset.index = i;
    const input = document.createElement('input');
    input.className = 'option-input';
    input.type = q.type === 'multi' ? 'checkbox' : 'radio';
    input.name = 'opt';
    input.value = i;
    input.addEventListener('change', () => {
      list.querySelectorAll('.option-label').forEach(l => l.classList.remove('selected'));
      if (q.type === 'single') {
        label.classList.add('selected');
      } else {
        if (input.checked) label.classList.add('selected');
        else label.classList.remove('selected');
      }
      document.getElementById('checkBtn').disabled = !anySelected();
    });
    const letters = ['A', 'B', 'C', 'D'];
    const span = document.createElement('span');
    span.className = 'option-text';
    span.textContent = `${letters[i]}) ${opt.t}`;
    label.appendChild(input);
    label.appendChild(span);
    list.appendChild(label);
  });

  const checkBtn = document.getElementById('checkBtn');
  checkBtn.disabled = true;
  checkBtn.style.display = 'inline-block';
  document.getElementById('nextBtn').style.display = 'none';
  const fb = document.getElementById('feedbackBox');
  fb.style.display = 'none';
  fb.className = 'feedback-box';
}

function anySelected() {
  return !!document.querySelector('.option-input:checked');
}

function checkAnswer() {
  const q = quizData[currentQuestion];
  const labels = document.querySelectorAll('.option-label');
  const inputs = document.querySelectorAll('.option-input');

  inputs.forEach(inp => inp.disabled = true);
  labels.forEach(l => { l.classList.add('disabled', 'checked'); l.classList.remove('selected'); });

  const correctSet = new Set(q.opts.map((o, i) => o.c ? i : -1).filter(i => i >= 0));
  const selectedSet = new Set();
  inputs.forEach((inp, i) => { if (inp.checked) selectedSet.add(i); });

  let isCorrect = false;
  let isPartial = false;

  if (q.type === 'single') {
    const sel = [...selectedSet][0];
    isCorrect = q.opts[sel]?.c === true;
  } else {
    const allCorrectSelected = [...correctSet].every(i => selectedSet.has(i));
    const noWrongSelected = [...selectedSet].every(i => correctSet.has(i));
    isCorrect = allCorrectSelected && noWrongSelected;
    if (!isCorrect) {
      const anyCorrectSelected = [...selectedSet].some(i => correctSet.has(i));
      isPartial = anyCorrectSelected || correctSet.size === 0;
    }
  }

  labels.forEach((label, i) => {
    const correct = q.opts[i].c;
    const selected = selectedSet.has(i);
    if (correct) {
      label.classList.add('correct');
      const sp = label.querySelector('.option-text');
      sp.textContent = '✓ ' + sp.textContent;
    } else if (selected) {
      label.classList.add('incorrect');
      const sp = label.querySelector('.option-text');
      sp.textContent = '✗ ' + sp.textContent;
    }
  });

  const fb = document.getElementById('feedbackBox');
  const verdict = document.getElementById('feedbackVerdict');
  const fbText = document.getElementById('feedbackText');

  if (isCorrect) {
    fb.className = 'feedback-box correct';
    verdict.textContent = 'Rätt!';
    score++;
  } else if (isPartial) {
    fb.className = 'feedback-box partial';
    verdict.textContent = 'Delvis rätt.';
  } else {
    fb.className = 'feedback-box incorrect';
    verdict.textContent = 'Fel.';
  }
  fbText.textContent = q.fb || q.feedback || '';
  fb.style.display = 'block';

  answers.push(isCorrect ? 1 : 0);
  currentQuestion++;
  saveProgress();

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
}

function nextQuestion() {
  if (currentQuestion >= quizData.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  clearProgress();
  document.getElementById('progressText').textContent = `Fråga ${quizData.length} av ${quizData.length}`;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('questionCard').innerHTML = `
    <div class="resume-screen">
      <div class="resume-title">Resultat</div>
      <div class="resume-info">Du svarade rätt på ${score} av ${quizData.length} frågor</div>
      <div style="margin-top:2rem">
        <button class="btn" onclick="restartQuiz()">Starta om</button>
      </div>
    </div>`;
}

(function init() {
  const hasSaved = loadProgress();
  if (hasSaved && currentQuestion > 0) {
    showResume(currentQuestion + 1, score);
  } else {
    renderQuestion();
  }
})();
</script>
</body>
</html>
