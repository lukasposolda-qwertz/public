<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikini Bottom Brawl - SpongeBob vs Patrick</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 1024px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 1024 / 600;
        }
        /* Scale to fit viewport */
        @media (max-width: 1024px) {
            #gameContainer {
                width: 100vw;
                height: auto;
            }
            #gameContainer canvas {
                width: 100%;
                height: auto;
            }
        }
        @media (max-height: 600px) {
            #gameContainer {
                height: 100vh;
                width: auto;
            }
            #gameContainer canvas {
                height: 100%;
                width: auto;
            }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        #bgCanvas { z-index: 0; }
        #effectsCanvas { z-index: 1; pointer-events: none; }
        #gameCanvas { z-index: 2; }
        #uiCanvas { z-index: 3; pointer-events: none; }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 20px;
            pointer-events: none;
        }
        .player-hud {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid;
            border-radius: 8px;
            padding: 8px 14px;
            color: #fff;
            font-size: 13px;
            min-width: 180px;
            pointer-events: auto;
        }
        #patrickHud { border-color: #ff69b4; }
        #spongebobHud { border-color: #ffe135; }
        .player-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        #patrickHud .player-name { color: #ff69b4; }
        #spongebobHud .player-name { color: #ffe135; }
        .score { font-size: 14px; margin-bottom: 4px; }

        #windDisplay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #5bc0de;
            border-radius: 8px;
            padding: 6px 16px;
            color: #5bc0de;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            text-align: center;
            pointer-events: none;
        }
        #windArrow {
            font-size: 20px;
            display: block;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #fff;
            border-radius: 10px;
            padding: 10px 20px;
            display: flex;
            gap: 16px;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        #controls label {
            color: #fff;
            font-size: 13px;
        }
        #controls input[type="number"] {
            width: 60px;
            padding: 4px 6px;
            border: 2px solid #5bc0de;
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-align: center;
        }
        #controls input[type="number"]:focus {
            outline: none;
            border-color: #ffe135;
        }
        #fireBtn {
            padding: 6px 20px;
            border: 2px solid #ff6b6b;
            border-radius: 6px;
            background: rgba(255, 50, 50, 0.3);
            color: #ff6b6b;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        #fireBtn:hover {
            background: rgba(255, 50, 50, 0.6);
            color: #fff;
        }
        #turnIndicator {
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            font-size: 36px;
            font-weight: bold;
            color: #ffe135;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }
        #message.show { opacity: 1; }

        #startScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 30;
            background: rgba(0, 20, 60, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Courier New', monospace;
        }
        #startScreen h1 {
            font-size: 42px;
            color: #ffe135;
            text-shadow: 3px 3px 0 #ff69b4;
            margin-bottom: 10px;
        }
        #startScreen h2 {
            font-size: 20px;
            color: #5bc0de;
            margin-bottom: 30px;
        }
        #startScreen .instructions {
            font-size: 14px;
            color: #ccc;
            text-align: center;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        #startBtn {
            padding: 12px 40px;
            border: 3px solid #ffe135;
            border-radius: 8px;
            background: rgba(255, 225, 53, 0.2);
            color: #ffe135;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.2s;
        }
        #startBtn:hover {
            background: rgba(255, 225, 53, 0.5);
            color: #000;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="bgCanvas" width="1024" height="600"></canvas>
        <canvas id="effectsCanvas" width="1024" height="600"></canvas>
        <canvas id="gameCanvas" width="1024" height="600"></canvas>
        <canvas id="uiCanvas" width="1024" height="600"></canvas>

        <div id="hud">
            <div class="player-hud" id="patrickHud">
                <div class="player-name">PATRICK</div>
                <div class="score">Score: <span id="patrickScore">0</span></div>
            </div>
            <div class="player-hud" id="spongebobHud">
                <div class="player-name">SPONGEBOB</div>
                <div class="score">Score: <span id="spongebobScore">0</span></div>
            </div>
        </div>

        <div id="windDisplay">
            <span id="windArrow"></span>
            <span id="windText">Wind: 0</span>
        </div>

        <div id="controls">
            <span id="turnIndicator">PATRICK's turn</span>
            <label>Angle: <input type="number" id="angleInput" value="45" min="0" max="90" step="1"></label>
            <label>Power: <input type="number" id="powerInput" value="50" min="1" max="100" step="1"></label>
            <button id="fireBtn">THROW!</button>
        </div>

        <div id="message"></div>

        <div id="startScreen">
            <h1>BIKINI BOTTOM BRAWL</h1>
            <h2>Patrick vs SpongeBob</h2>
            <div class="instructions">
                Set ANGLE (0-90°) and POWER (1-100)<br>
                Throw jellyfish at your opponent!<br>
                Watch out for the ocean current! 🌊<br>
                First to 3 hits wins!
            </div>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <script>
    // ============================================================
    // BIKINI BOTTOM BRAWL - A Gorillas-style game
    // SpongeBob vs Patrick throwing jellyfish in Bikini Bottom
    // ============================================================

    const CANVAS_W = 1024;
    const CANVAS_H = 600;
    const GRAVITY = 0.15;
    const WINS_NEEDED = 3;
    const GROUND_Y = 500;
    const CHAR_W = 65;
    const CHAR_H = 80;

    // Canvas layers
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    const effectsCanvas = document.getElementById('effectsCanvas');
    const effectsCtx = effectsCanvas.getContext('2d');
    const gameCanvas = document.getElementById('gameCanvas');
    const gameCtx = gameCanvas.getContext('2d');
    const uiCanvas = document.getElementById('uiCanvas');
    const uiCtx = uiCanvas.getContext('2d');

    // UI elements
    const angleInput = document.getElementById('angleInput');
    const powerInput = document.getElementById('powerInput');
    const fireBtn = document.getElementById('fireBtn');
    const turnIndicator = document.getElementById('turnIndicator');
    const windArrow = document.getElementById('windArrow');
    const windText = document.getElementById('windText');
    const messageEl = document.getElementById('message');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');

    // Game state
    let gameState = 'start'; // start, playing, throwing, hit, gameover
    let currentPlayer = 0; // 0 = Patrick, 1 = SpongeBob
    let scores = [0, 0];
    let wind = 0; // negative = left, positive = right
    let projectile = null;
    let explosions = [];
    let trailParticles = [];

    // Player positions
    const players = [
        { name: 'Patrick', x: 55, y: 0, color: '#ff69b4', w: CHAR_W, h: CHAR_H },
        { name: 'SpongeBob', x: 895, y: 0, color: '#ffe135', w: CHAR_W, h: CHAR_H }
    ];

    // Terrain collision zones (invisible, matching background landmarks)
    // These define where jellyfish can collide with the scenery
    let terrainZones = [];

    // Underwater effects
    let bubbles = [];
    let waveOffset = 0;
    let waveTime = 0;
    let currentWind = 0; // smoothed wind for effects (gradual transition)
    let targetWind = 0;  // the actual wind value we're transitioning to
    let effectsRAF = null; // moved here to avoid temporal dead zone

    // Assets
    const bgImage = new Image();
    const jellyfishImage = new Image();
    const patrickImage = new Image();
    const spongebobImage = new Image();
    let assetsLoaded = 0;
    const TOTAL_ASSETS = 4;

    const allImages = [bgImage, jellyfishImage, patrickImage, spongebobImage];
    function onAssetLoad() {
        // Count how many are actually loaded
        assetsLoaded = allImages.filter(img => img.complete && img.naturalWidth > 0).length;
        checkAssetsReady();
    }
    allImages.forEach(img => {
        img.onload = onAssetLoad;
        img.onerror = (e) => console.error('Failed to load', img.src);
    });
    bgImage.src = 'background.png';
    jellyfishImage.src = 'jellyfish_new.png';
    patrickImage.src = 'patrick_pixel.png';
    spongebobImage.src = 'spongebob_pixel.png';

    // Handle already-cached images
    onAssetLoad();

    function checkAssetsReady() {
        if (assetsLoaded >= TOTAL_ASSETS) {
            drawBackground();
            generateTerrain();
            positionPlayers();
            drawScene();
            startEffectsLoop();
        }
    }

    // ============================================================
    // BUILDINGS / TERRAIN
    // ============================================================

    function generateTerrain() {
        // Only a single ground-level collision at the characters' foot line (y=545)
        // Jellyfish fly freely over all buildings and only land at ground level
        terrainZones = [
            { x: 0, y: 545, w: 1024, h: 55 },
        ];
    }

    function positionPlayers() {
        // Patrick on the left, feet at y=545 so legs are on the dark sidewalk strip
        players[0].x = 55;
        players[0].y = 545 - players[0].h;

        // SpongeBob on the far right, between the two small plants (x~885 and x~970)
        players[1].x = 895;
        players[1].y = 545 - players[1].h;
    }

    // ============================================================
    // DRAWING
    // ============================================================

    function drawBackground() {
        // Draw the Bikini Bottom background image
        bgCtx.drawImage(bgImage, 0, 0, CANVAS_W, CANVAS_H);

        // Slight underwater tint overlay
        bgCtx.fillStyle = 'rgba(0, 40, 80, 0.15)';
        bgCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }

    function drawTerrain() {
        // Terrain zones are invisible - the background image provides the visuals
        // Uncomment below for debugging collision zones:
        // gameCtx.save();
        // gameCtx.globalAlpha = 0.3;
        // gameCtx.fillStyle = 'red';
        // for (const z of terrainZones) {
        //     gameCtx.fillRect(z.x, z.y, z.w, z.h);
        // }
        // gameCtx.restore();
    }

    function drawPlayers() {
        // Patrick - image sprite
        gameCtx.imageSmoothingEnabled = false;
        gameCtx.drawImage(patrickImage, players[0].x, players[0].y, players[0].w, players[0].h);
        // SpongeBob - image sprite
        gameCtx.drawImage(spongebobImage, players[1].x, players[1].y, players[1].w, players[1].h);
        gameCtx.imageSmoothingEnabled = true;
    }

    function drawProjectile() {
        if (!projectile) return;

        // Glow effect behind jellyfish
        gameCtx.save();
        gameCtx.globalAlpha = 0.25;
        const glow = gameCtx.createRadialGradient(projectile.x, projectile.y, 0, projectile.x, projectile.y, 22);
        glow.addColorStop(0, 'rgba(200, 100, 255, 0.6)');
        glow.addColorStop(1, 'rgba(200, 100, 255, 0)');
        gameCtx.fillStyle = glow;
        gameCtx.beginPath();
        gameCtx.arc(projectile.x, projectile.y, 22, 0, Math.PI * 2);
        gameCtx.fill();
        gameCtx.restore();

        // Draw jellyfish image (no rotation - jellyfish float upright)
        const size = 36;
        gameCtx.save();
        // Slight bobbing motion
        const bob = Math.sin(projectile.rotation * 3) * 2;
        gameCtx.drawImage(jellyfishImage, projectile.x - size / 2, projectile.y - size / 2 + bob, size, size);
        gameCtx.restore();
    }

    function drawTrail() {
        for (let i = trailParticles.length - 1; i >= 0; i--) {
            const p = trailParticles[i];
            p.life -= 0.02;
            p.x += p.vx;
            p.y += p.vy;
            if (p.life <= 0) {
                trailParticles.splice(i, 1);
                continue;
            }
            gameCtx.save();
            gameCtx.globalAlpha = p.life * 0.6;
            gameCtx.fillStyle = p.color;
            gameCtx.beginPath();
            gameCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            gameCtx.fill();
            gameCtx.restore();
        }
    }

    function drawExplosions() {
        for (let i = explosions.length - 1; i >= 0; i--) {
            const e = explosions[i];
            e.life -= 0.02;
            if (e.life <= 0) {
                explosions.splice(i, 1);
                continue;
            }
            const radius = e.maxRadius * (1 - e.life);
            gameCtx.save();
            gameCtx.globalAlpha = e.life;

            // Electric zap effect (jellyfish sting!)
            gameCtx.strokeStyle = '#ff69b4';
            gameCtx.lineWidth = 3;
            for (let j = 0; j < 8; j++) {
                const angle = (j / 8) * Math.PI * 2 + e.life * 5;
                const len = radius * (0.5 + Math.random() * 0.5);
                gameCtx.beginPath();
                gameCtx.moveTo(e.x, e.y);
                const midX = e.x + Math.cos(angle) * len * 0.5 + (Math.random() - 0.5) * 15;
                const midY = e.y + Math.sin(angle) * len * 0.5 + (Math.random() - 0.5) * 15;
                gameCtx.lineTo(midX, midY);
                gameCtx.lineTo(e.x + Math.cos(angle) * len, e.y + Math.sin(angle) * len);
                gameCtx.stroke();
            }

            // Inner glow
            const grad = gameCtx.createRadialGradient(e.x, e.y, 0, e.x, e.y, radius);
            grad.addColorStop(0, 'rgba(255, 255, 100, 0.8)');
            grad.addColorStop(0.5, 'rgba(255, 105, 180, 0.4)');
            grad.addColorStop(1, 'rgba(255, 105, 180, 0)');
            gameCtx.fillStyle = grad;
            gameCtx.beginPath();
            gameCtx.arc(e.x, e.y, radius, 0, Math.PI * 2);
            gameCtx.fill();

            gameCtx.restore();
        }
    }

    function drawAimLine() {
        if (gameState !== 'playing') return;
        const p = players[currentPlayer];
        const angle = parseFloat(angleInput.value) * Math.PI / 180;
        const power = parseFloat(powerInput.value);
        const dir = currentPlayer === 0 ? 1 : -1;

        const startX = p.x + p.w / 2;
        const startY = p.y + 5;
        const lineLen = power * 0.8;

        const endX = startX + Math.cos(angle) * lineLen * dir;
        const endY = startY - Math.sin(angle) * lineLen;

        uiCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        uiCtx.save();
        uiCtx.setLineDash([4, 4]);
        uiCtx.strokeStyle = currentPlayer === 0 ? '#ff69b4' : '#ffe135';
        uiCtx.lineWidth = 2;
        uiCtx.globalAlpha = 0.7;
        uiCtx.beginPath();
        uiCtx.moveTo(startX, startY);
        uiCtx.lineTo(endX, endY);
        uiCtx.stroke();

        // Arrow head
        const arrowAngle = Math.atan2(endY - startY, endX - startX);
        uiCtx.setLineDash([]);
        uiCtx.beginPath();
        uiCtx.moveTo(endX, endY);
        uiCtx.lineTo(endX - 10 * Math.cos(arrowAngle - 0.4), endY - 10 * Math.sin(arrowAngle - 0.4));
        uiCtx.moveTo(endX, endY);
        uiCtx.lineTo(endX - 10 * Math.cos(arrowAngle + 0.4), endY - 10 * Math.sin(arrowAngle + 0.4));
        uiCtx.stroke();
        uiCtx.restore();
    }

    function drawScene() {
        gameCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        drawTerrain();
        drawPlayers();
        drawProjectile();
        drawTrail();
        drawExplosions();
        drawAimLine();
    }

    // ============================================================
    // UNDERWATER EFFECTS
    // ============================================================

    function spawnBubble() {
        const windStrength = Math.abs(currentWind);
        // More bubbles when wind is stronger
        const chance = 0.02 + windStrength * 0.015;
        if (Math.random() < chance) {
            bubbles.push({
                x: Math.random() * CANVAS_W,
                y: CANVAS_H + 10,
                size: 2 + Math.random() * 6,
                speed: 0.3 + Math.random() * 0.8 + windStrength * 0.15,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.03,
                wobbleAmp: 0.3 + Math.random() * 0.5,
                drift: 0, // current horizontal drift, updated each frame
                opacity: 0.15 + Math.random() * 0.25
            });
        }
    }

    function updateBubbles() {
        // Gradually transition currentWind toward targetWind
        const lerpSpeed = 0.03; // gradual but noticeable transition
        currentWind += (targetWind - currentWind) * lerpSpeed;

        for (let i = bubbles.length - 1; i >= 0; i--) {
            const b = bubbles[i];
            b.y -= b.speed;
            b.wobble += b.wobbleSpeed;
            // Drift follows the smoothed current wind direction
            b.drift += (currentWind * 0.15 - b.drift) * 0.02; // each bubble adjusts gradually too
            b.x += Math.sin(b.wobble) * b.wobbleAmp + b.drift;

            if (b.y < -20 || b.x < -20 || b.x > CANVAS_W + 20) {
                bubbles.splice(i, 1);
            }
        }
    }

    function drawEffects() {
        effectsCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        const smoothWind = Math.abs(currentWind);

        // Wave/caustic light overlay - moves in wind direction
        waveTime += 0.008 + smoothWind * 0.003;
        const windShift = currentWind * 0.02; // waves drift with current
        effectsCtx.save();
        effectsCtx.globalAlpha = 0.04 + smoothWind * 0.01;
        for (let i = 0; i < 6; i++) {
            const yBase = 50 + i * 100;
            effectsCtx.strokeStyle = `rgba(100, 200, 255, ${0.3 + smoothWind * 0.05})`;
            effectsCtx.lineWidth = 1.5;
            effectsCtx.beginPath();
            for (let x = 0; x < CANVAS_W; x += 4) {
                const y = yBase +
                    Math.sin(x * 0.01 + waveTime + i + windShift * x) * (15 + smoothWind * 5) +
                    Math.sin(x * 0.025 + waveTime * 1.3 + i * 0.5) * (8 + smoothWind * 3);
                if (x === 0) effectsCtx.moveTo(x, y);
                else effectsCtx.lineTo(x, y);
            }
            effectsCtx.stroke();
        }
        effectsCtx.restore();

        // Caustic light pattern - drifts with current
        effectsCtx.save();
        effectsCtx.globalAlpha = 0.025 + smoothWind * 0.008;
        effectsCtx.fillStyle = '#80d4ff';
        for (let i = 0; i < 12; i++) {
            const cx = (Math.sin(waveTime * 0.7 + i * 1.7) * 0.5 + 0.5) * CANVAS_W + currentWind * 5;
            const cy = (Math.cos(waveTime * 0.5 + i * 2.1) * 0.5 + 0.5) * CANVAS_H;
            const r = 30 + Math.sin(waveTime + i) * 15;
            effectsCtx.beginPath();
            effectsCtx.ellipse(cx, cy, r, r * 0.6, waveTime + i, 0, Math.PI * 2);
            effectsCtx.fill();
        }
        effectsCtx.restore();

        // Bubbles
        spawnBubble();
        updateBubbles();
        for (const b of bubbles) {
            effectsCtx.save();
            effectsCtx.globalAlpha = b.opacity;
            effectsCtx.strokeStyle = 'rgba(180, 230, 255, 0.8)';
            effectsCtx.fillStyle = 'rgba(180, 230, 255, 0.15)';
            effectsCtx.lineWidth = 1;
            effectsCtx.beginPath();
            effectsCtx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
            effectsCtx.fill();
            effectsCtx.stroke();

            // Highlight
            effectsCtx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            effectsCtx.beginPath();
            effectsCtx.arc(b.x - b.size * 0.3, b.y - b.size * 0.3, b.size * 0.25, 0, Math.PI * 2);
            effectsCtx.fill();
            effectsCtx.restore();
        }

        // Floating particles (plankton/debris) - drift with current
        effectsCtx.save();
        const particleCount = 3 + Math.floor(smoothWind * 3);
        for (let i = 0; i < particleCount; i++) {
            const px = (Math.sin(waveTime * (0.3 + i * 0.1) + i * 4.3) * 0.5 + 0.5) * CANVAS_W + currentWind * 8;
            const py = (Math.cos(waveTime * (0.2 + i * 0.07) + i * 3.1) * 0.5 + 0.5) * CANVAS_H;
            effectsCtx.globalAlpha = 0.1 + Math.sin(waveTime + i) * 0.05;
            effectsCtx.fillStyle = '#90ee90';
            effectsCtx.fillRect(px, py, 2, 2);
        }
        effectsCtx.restore();
    }

    function startEffectsLoop() {
        // Cancel any existing loop and start fresh
        if (effectsRAF) cancelAnimationFrame(effectsRAF);
        function loop() {
            drawEffects();
            effectsRAF = requestAnimationFrame(loop);
        }
        loop();
    }

    // ============================================================
    // WIND
    // ============================================================

    function randomizeWind() {
        wind = (Math.random() - 0.5) * 8; // -4 to 4
        targetWind = wind; // effects will gradually transition
        updateWindDisplay();
    }

    function updateWindDisplay() {
        const strength = Math.abs(wind).toFixed(1);
        const arrows = Math.ceil(Math.abs(wind));
        if (wind < -0.3) {
            windArrow.textContent = '◄'.repeat(arrows);
            windText.textContent = `Current: ${strength} ← `;
        } else if (wind > 0.3) {
            windArrow.textContent = '►'.repeat(arrows);
            windText.textContent = `Current: ${strength} →`;
        } else {
            windArrow.textContent = '~';
            windText.textContent = 'Current: calm';
        }
    }

    // ============================================================
    // GAME LOGIC
    // ============================================================

    function fire() {
        if (gameState !== 'playing') return;
        gameState = 'throwing';

        const p = players[currentPlayer];
        const angle = parseFloat(angleInput.value) * Math.PI / 180;
        const power = parseFloat(powerInput.value) * 0.12;
        const dir = currentPlayer === 0 ? 1 : -1;

        projectile = {
            x: p.x + p.w / 2,
            y: p.y + 5,
            vx: Math.cos(angle) * power * dir,
            vy: -Math.sin(angle) * power,
            rotation: 0
        };

        uiCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        fireBtn.disabled = true;
        angleInput.disabled = true;
        powerInput.disabled = true;

        animateProjectile();
    }

    function animateProjectile() {
        if (!projectile) return;

        // Physics
        projectile.vy += GRAVITY;
        projectile.vx += wind * 0.002;
        projectile.x += projectile.vx;
        projectile.y += projectile.vy;
        projectile.rotation += 0.05;

        // Trail
        trailParticles.push({
            x: projectile.x + (Math.random() - 0.5) * 6,
            y: projectile.y + (Math.random() - 0.5) * 6,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            size: 3 + Math.random() * 3,
            life: 1,
            color: Math.random() > 0.5 ? '#ff69b4' : '#ffb6d9'
        });

        // Check collision with opponent (AABB - rectangle overlap, more generous)
        const opponent = players[1 - currentPlayer];
        const hitPadding = 10; // extra pixels of forgiveness
        if (projectile.x >= opponent.x - hitPadding &&
            projectile.x <= opponent.x + opponent.w + hitPadding &&
            projectile.y >= opponent.y - hitPadding &&
            projectile.y <= opponent.y + opponent.h + hitPadding) {
            // HIT!
            createExplosion(opponent.x + opponent.w / 2, opponent.y + opponent.h / 2);
            projectile = null;
            scores[currentPlayer]++;
            updateScores();
            showMessage(`${players[currentPlayer].name} STINGS!`);

            if (scores[currentPlayer] >= WINS_NEEDED) {
                setTimeout(() => {
                    showMessage(`${players[currentPlayer].name} WINS!\nClick to play again`);
                    gameState = 'gameover';
                }, 1500);
            } else {
                setTimeout(() => nextTurn(), 2000);
            }
            drawScene();
            return;
        }

        // Check collision with terrain (only when projectile is falling down)
        if (projectile.vy > 0) {
            for (const b of terrainZones) {
                if (projectile.x >= b.x && projectile.x <= b.x + b.w &&
                    projectile.y >= b.y && projectile.y <= b.y + b.h) {
                    createExplosion(projectile.x, projectile.y);
                    projectile = null;
                    showMessage('MISS!');
                    setTimeout(() => nextTurn(), 1200);
                    drawScene();
                    return;
                }
            }
        }

        // Off screen
        if (projectile.y > CANVAS_H + 50 || projectile.x < -100 || projectile.x > CANVAS_W + 100) {
            projectile = null;
            showMessage('MISS!');
            setTimeout(() => nextTurn(), 1200);
            drawScene();
            return;
        }

        drawScene();
        requestAnimationFrame(animateProjectile);
    }

    function createExplosion(x, y) {
        explosions.push({
            x, y,
            life: 1,
            maxRadius: 50
        });
        // Spark particles
        for (let i = 0; i < 20; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1 + Math.random() * 3;
            trailParticles.push({
                x, y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: 2 + Math.random() * 4,
                life: 1,
                color: ['#ff69b4', '#ffe135', '#ffffff', '#ff6b6b'][Math.floor(Math.random() * 4)]
            });
        }
    }

    function nextTurn() {
        hideMessage();
        currentPlayer = 1 - currentPlayer;
        randomizeWind();
        gameState = 'playing';
        updateTurnIndicator();
        fireBtn.disabled = false;
        angleInput.disabled = false;
        powerInput.disabled = false;
        angleInput.focus();
        drawScene();
    }

    function updateScores() {
        document.getElementById('patrickScore').textContent = scores[0];
        document.getElementById('spongebobScore').textContent = scores[1];
    }

    function updateTurnIndicator() {
        const name = players[currentPlayer].name.toUpperCase();
        const color = currentPlayer === 0 ? '#ff69b4' : '#ffe135';
        turnIndicator.innerHTML = `<span style="color:${color}">${name}</span>'s turn`;
    }

    function showMessage(text) {
        messageEl.textContent = text;
        messageEl.classList.add('show');
    }

    function hideMessage() {
        messageEl.classList.remove('show');
    }

    function startGame() {
        scores = [0, 0];
        updateScores();
        currentPlayer = 0;
        randomizeWind();
        generateTerrain();
        positionPlayers();
        gameState = 'playing';
        updateTurnIndicator();
        fireBtn.disabled = false;
        angleInput.disabled = false;
        powerInput.disabled = false;
        hideMessage();
        startScreen.style.display = 'none';
        startEffectsLoop();
        drawScene();
        angleInput.focus();
    }

    // ============================================================
    // EVENT LISTENERS
    // ============================================================

    startBtn.addEventListener('click', startGame);
    fireBtn.addEventListener('click', fire);

    // Keyboard: Enter to fire
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (gameState === 'playing') {
                fire();
            } else if (gameState === 'gameover') {
                startGame();
            }
        }
    });

    // Click to restart after game over
    gameCanvas.addEventListener('click', () => {
        if (gameState === 'gameover') {
            startGame();
        }
    });

    // Redraw aim line when inputs change
    angleInput.addEventListener('input', drawAimLine);
    powerInput.addEventListener('input', drawAimLine);

    // Continuous draw loop for explosions and trail when not throwing
    function mainLoop() {
        if (gameState !== 'throwing') {
            drawScene();
        }
        requestAnimationFrame(mainLoop);
    }
    mainLoop();

    </script>
</body>
</html>
